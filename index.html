<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARTHUR v11.5</title>
    <style>
        :root { --glow: #00f2ff; --bg: #050000; }
        /* CRITICAL: Disables all Safari default touch behaviors */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-user-select: none; 
            user-select: none; 
            touch-action: none; 
        }
        body { 
            background: var(--bg); color: var(--glow); 
            font-family: sans-serif; display: flex; 
            flex-direction: column; align-items: center; 
            justify-content: space-around; height: 100vh; margin: 0; 
        }
        #arc-reactor { 
            width: 200px; height: 200px; 
            border: 4px solid var(--glow); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 5rem; text-shadow: 0 0 10px var(--glow); 
            box-shadow: inset 0 0 30px var(--glow), 0 0 20px var(--glow); 
            position: relative; z-index: 100;
        }
        #display-panel { width: 90%; text-align: center; border-top: 1px solid var(--glow); padding: 20px; }
        #status { font-size: 0.8rem; letter-spacing: 4px; font-weight: bold; margin-bottom: 10px; }
        #output { font-size: 1.1rem; font-style: italic; color: #fff; }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="arc-reactor">A</div>

    <div id="display-panel">
        <div id="status">V11.5 ARMED</div>
        <div id="output">"Hold A to speak, Sir."</div>
    </div>

    <script>
        const GK_1 = "gsk_";
        const GK_2 = "zWqULWs5POPr7KPFqUp5WGdyb3FYF5mORx3bOk6Lz9l3LFOfsdta";
        const OK_1 = "sk-proj-";
        const OK_2 = "1iJ4z-Ut_aTNd3oP3FUjb_23Tc6ngugMShPm9ppNrM7b1Ng7IuwPAltinvmPry0exPvhY-eEr1T3BlbkFJ7-06AAOmNaQE14RhUBD4-5PVNI-7gM3U75dBjzy31tovHzWzCm-kny2LbuIhmK24M9SZh90BsA";

        const F_GK = GK_1 + GK_2;
        const F_OK = OK_1 + OK_2;

        const status = document.getElementById('status'), output = document.getElementById('output'), reactor = document.getElementById('arc-reactor');
        let mediaRecorder, chunks = [];

        async function processVoice(blob) {
            status.innerText = "THINKING...";
            const fd = new FormData();
            fd.append("file", blob, "audio.m4a");
            fd.append("model", "whisper-1");

            try {
                const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
                    method: "POST", headers: { "Authorization": `Bearer ${F_OK}` }, body: fd
                });
                const data = await res.json();
                if (!data?.text) throw new Error(data?.error?.message || "Silence detected.");
                output.innerText = `"${data.text}"`;

                const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${F_GK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role:"system", content:"You are ARTHUR. Dry wit. Max 10 words. Sir."}, {role:"user", content: data.text}]
                    })
                });

                const groqData = await groqRes.json();
                const reply = groqData?.choices?.?.message?.content;

                if (reply) {
                    output.innerText = reply;
                    speak(reply);
                    status.innerText = "READY";
                } else {
                    throw new Error(groqData?.error?.message || "Brain mismatch.");
                }
            } catch(e) { 
                status.innerText = "ALERT"; 
                output.innerText = "Diagnostic: " + e.message; 
            }
        }

        async function startListening() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(s);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => processVoice(new Blob(chunks, { type: 'audio/mp4' }));
                mediaRecorder.start();
                status.innerText = "LISTENING";
                reactor.style.boxShadow = "0 0 60px var(--glow)";
            } catch(e) { status.innerText = "MIC_ERR"; }
        }

        function stopListening() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                reactor.style.boxShadow = "inset 0 0 30px var(--glow), 0 0 20px var(--glow)";
            }
        }

        function speak(t) { 
            window.speechSynthesis.cancel(); 
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); 
        }

        // AGGRESSIVE TOUCH BINDING
        reactor.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            startListening(); 
        }, {passive: false});

        reactor.addEventListener('touchend', (e) => { 
            e.preventDefault(); 
            stopListening(); 
        }, {passive: false});

        // Initialize Audio Engine
        document.body.addEventListener('touchstart', () => { 
            window.speechSynthesis.getVoices(); 
        }, {once: true});
    </script>
</body>
</html>
