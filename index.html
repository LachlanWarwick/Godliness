<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GODLINESS Ascension</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style id="theme-style">
        :root { 
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #fbbf24; 
            --secondary: #22c55e; --accent: #3b82f6; --danger: #ef4444; --font-main: 'Segoe UI', sans-serif;
        }
        .light-mode { --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --primary: #d97706; }
        .midnight-mode { --bg: #000000; --card: #111111; --text: #ffffff; --primary: #ffd700; }
        
        body { background: var(--bg); color: var(--text); font-family: var(--font-main); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; transition: background 0.3s; }
        .hidden { display: none !important; }
        .container { width: 100%; max-width: 400px; padding-bottom: 60px; }

        /* XP Animation */
        @keyframes xpFloat { 0% { opacity: 0; transform: translateY(0); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateY(-60px); } }
        .xp-popup { position: absolute; color: var(--primary); font-weight: 900; animation: xpFloat 1s forwards; pointer-events: none; z-index: 1000; }

        /* Cards */
        .box, .task-item, .friend-card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .task-item { display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .task-item.done { border: 2px solid var(--secondary); background: rgba(34, 197, 94, 0.1); }

        /* Tabs UI */
        .tab-container { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 5px; margin: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .day-tab { padding: 5px 12px; border-radius: 10px; font-size: 0.75rem; white-space: nowrap; cursor: pointer; background: rgba(255,255,255,0.05); opacity: 0.6; }
        .day-tab.active { background: var(--primary); color: #000; opacity: 1; font-weight: bold; }

        /* Progress Bar */
        .progress-container { background: rgba(255,255,255,0.1); height: 12px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        #progress-bar { background: var(--primary); height: 100%; width: 0%; transition: width 0.8s ease-in-out; }

        /* Inputs & Buttons */
        button { background: var(--primary); border: none; padding: 12px; border-radius: 50px; font-weight: bold; color: #000; cursor: pointer; width: 100%; margin: 5px 0; }
        input, select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: inherit; margin: 5px 0; }
        
        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); padding: 25px; border-radius: 25px; width: 90%; max-width: 380px; max-height: 80vh; overflow-y: auto; position: relative; }

        .wheel-outer { position: relative; width: 200px; height: 200px; margin: 15px auto; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--accent); position: relative; overflow: hidden; transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1); background: var(--accent); }
        .segment { position: absolute; width: 50%; height: 50%; top: 0; left: 50%; transform-origin: 0% 100%; }
        .pointer { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid var(--danger); position: absolute; top: -10px; left: 50%; transform: translateX(-50%); z-index: 10; }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <div id="auth-screen">
            <h1 style="text-align:center; color:var(--primary);">GODLINESS</h1>
            <div class="box">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Password">
                <button onclick="handleAuth('login')">Login</button>
                <button style="background:transparent; color:var(--primary); border:1px solid var(--primary);" onclick="handleAuth('signup')">Sign Up</button>
            </div>
        </div>

        <div id="squad-screen" class="hidden">
            <h2 style="text-align:center;">Squad Setup</h2>
            <div class="box">
                <input type="text" id="squad-input" placeholder="Enter Code">
                <button onclick="joinSquad()">Join Squad</button>
                <button style="background:var(--accent); color:white;" onclick="createSquad()">Start New Squad</button>
            </div>
        </div>

        <div id="app-screen" class="hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div id="display-name" style="font-weight:900;">Warrior</div>
                <div style="display:flex; gap:10px;">
                    <button onclick="document.getElementById('achieveModal').style.display='flex'" style="width:auto; padding:8px 15px;">🏆</button>
                    <button onclick="document.getElementById('settingsModal').style.display='flex'" style="width:auto; background:none; color:inherit; font-size:1.5rem; padding:0;">⚙️</button>
                </div>
            </div>

            <div class="box" style="text-align:center;">
                <h2 id="user-rank" style="margin:0;">Level 1</h2>
                <div class="progress-container"><div id="progress-bar"></div></div>
                <small>XP: <span id="xp-display">0</span> / 700</small>
            </div>

            <div id="task-container"></div>

            <div class="box" style="text-align:center;">
                <h3>Sidequest Wheel</h3>
                <div class="wheel-outer"><div class="pointer"></div><div id="wheel"></div></div>
                <div id="quest-display" style="margin-bottom:10px; font-weight:bold; min-height:20px;"></div>
                <div style="display:flex; gap:10px;">
                    <button id="spin-btn" onclick="spinWheel()">SPIN</button>
                    <button onclick="openQuestModal()" style="background:#475569; color:white; width:auto;">Edit</button>
                </div>
            </div>

            <div class="box">
                <h3 style="text-align:center;">Squad Activity</h3>
                <div id="friends-list"></div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal" onclick="this.style.display='none'"><div class="modal-content" onclick="event.stopPropagation()">
        <h2>Customization</h2>
        <label>Warrior Name</label><input type="text" id="set-name">
        
        <label>Font Style</label>
        <select id="font-select">
            <option value="'Segoe UI', sans-serif">Modern Sans</option>
            <option value="'Courier New', monospace">Retro Mono</option>
            <option value="Georgia, serif">Classic Serif</option>
            <option value="'Comic Sans MS', cursive">Casual</option>
            <option value="'Impact', sans-serif">Bold Heavy</option>
        </select>

        <label>Custom Background Hex</label>
        <div style="display:flex; gap:5px;"><input type="text" id="custom-bg" placeholder="#0f172a"><button onclick="applyCustomColor()" style="width:auto;">Apply</button></div>
        
        <button onclick="updateProfile()" style="margin-top:15px;">Save Profile</button>
        <button class="leave-btn" style="background:var(--danger); color:white;" onclick="leaveSquad()">Leave Squad</button>
        <button style="background:#475569; color:white;" onclick="auth.signOut()">Logout</button>
        <button onclick="document.getElementById('settingsModal').style.display='none'" style="background:none; color:var(--text);">Back</button>
    </div></div>

    <div id="questModal" class="modal" onclick="this.style.display='none'"><div class="modal-content" onclick="event.stopPropagation()">
        <h3>Edit Sidequests</h3>
        <div style="display:flex; gap:5px;"><input id="new-quest-input" placeholder="New Quest..."><button onclick="addCustomQuest()" style="width:auto;">Add</button></div>
        <div id="quest-edit-list" style="margin:15px 0;"></div>
        <button onclick="document.getElementById('questModal').style.display='none'">Close</button>
    </div></div>

    <div id="achieveModal" class="modal" onclick="this.style.display='none'"><div class="modal-content" onclick="event.stopPropagation()"><h2>Trophies</h2><div id="achievements-full-list"></div><button onclick="document.getElementById('achieveModal').style.display='none'">Close</button></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAwJEP9IzCqyaNKQBjJohPEmykTpSBL5l4",
            authDomain: "godliness-bd3f8.firebaseapp.com",
            projectId: "godliness-bd3f8",
            storageBucket: "godliness-bd3f8.firebasestorage.app",
            messagingSenderId: "520495643556",
            appId: "1:520495643556:web:e107bee032556f9ed89f31",
            databaseURL: "https://godliness-bd3f8-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        const taskDefs = [
            {l:'G', t:'Gratitude', s:'3 Blessings'}, {l:'O', t:'Outreach', s:'Kindness'},
            {l:'D', t:'Discipline', s:'Hard task'}, {l:'L', t:'Listen', s:'Quiet time'},
            {l:'I', t:'Imagine', s:'Creative'}, {l:'N', t:'New Ground', s:'Learn'},
            {l:'E', t:'Examine', s:'Study'}, {l:'S', t:'Sidequest', s:'Wheel'},
            {l:'S', t:'Self-Reflect', s:'Night Recap'}
        ];

        let userState = null;
        let sidequests = ["Solo: 50 Pushups", "Squad: No Junk Food", "Solo: Cold Shower", "Squad: Read 10 Pages"];
        let activeTabs = {}; // Track which date tab is selected per user

        auth.onAuthStateChanged(user => {
            if(user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    userState = snap.val();
                    if(userState) {
                        document.body.style.setProperty('--font-main', userState.font || "'Segoe UI', sans-serif");
                        if(userState.customBg) document.body.style.backgroundColor = userState.customBg;
                        if(!userState.squadId) {
                            document.getElementById('auth-screen').classList.add('hidden');
                            document.getElementById('squad-screen').classList.remove('hidden');
                            document.getElementById('app-screen').classList.add('hidden');
                        } else {
                            document.getElementById('auth-screen').classList.add('hidden');
                            document.getElementById('squad-screen').classList.add('hidden');
                            document.getElementById('app-screen').classList.remove('hidden');
                            showApp();
                        }
                    }
                });
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        function showApp() {
            document.getElementById('display-name').innerText = userState.name;
            document.getElementById('xp-display').innerText = userState.xp;
            document.getElementById('user-rank').innerText = `Level ${userState.lvl}`;
            document.getElementById('progress-bar').style.width = (userState.xp / 7) + '%';
            
            renderTasks();
            setupWheel();

            // SQUAD ACTIVITY SYNC
            db.ref('users').orderByChild('squadId').equalTo(userState.squadId).on('value', snap => {
                const members = Object.values(snap.val() || {});
                const fl = document.getElementById('friends-list');
                fl.innerHTML = '';
                
                members.forEach(m => {
                    const mId = m.name.replace(/\s/g, '');
                    const historyByDate = {};
                    if(m.history) {
                        m.history.forEach(h => {
                            if(!historyByDate[h.d]) historyByDate[h.d] = [];
                            historyByDate[h.d].push(h);
                        });
                    }

                    const dates = Object.keys(historyByDate).sort((a,b) => new Date(b) - new Date(a));
                    if(!activeTabs[mId]) activeTabs[mId] = dates || "";

                    const tabHtml = dates.map(d => `<div class="day-tab ${activeTabs[mId] === d ? 'active' : ''}" onclick="switchTab('${mId}', '${d}')">${d}</div>`).join('');
                    const currentHistory = historyByDate[activeTabs[mId]] || [];
                    const historyHtml = currentHistory.map(h => `<div style="font-size:0.8rem; margin:5px 0;"><b>${h.t}:</b> ${h.n}</div>`).join('') || "<small>No activity for this day.</small>";

                    fl.innerHTML += `
                        <div class="friend-card">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <b>${m.name === userState.name ? 'You' : m.name}</b>
                                <span style="font-size:0.75rem; color:var(--primary);">Lvl ${m.lvl} • ${m.xp}XP</span>
                            </div>
                            <div class="tab-container">${tabHtml}</div>
                            <div id="hist-${mId}">${historyHtml}</div>
                        </div>
                    `;
                });
            });
        }

        function switchTab(mId, date) {
            activeTabs[mId] = date;
            showApp(); // Re-render to show correct history
        }

        function renderTasks() {
            const today = new Date().toLocaleDateString();
            const doneToday = userState.history ? userState.history.filter(h => h.d === today).map(h => h.t) : [];
            document.getElementById('task-container').innerHTML = taskDefs.map(item => `
                <div class="task-item ${doneToday.includes(item.t) ? 'done' : ''}" onclick="logTask('${item.t}', event)">
                    <div><b>${item.l}</b> - ${item.t}</div>
                    <div style="font-size:0.8rem;">🔥 ${userState.streaks?.[item.t] || 0}</div>
                </div>`).join('');
        }

        async function logTask(t, event) {
            const today = new Date().toLocaleDateString();
            if(userState.history && userState.history.some(h => h.t === t && h.d === today)) return;
            const n = prompt(`Log for ${t}:`);
            if(!n) return;

            const rect = event.currentTarget.getBoundingClientRect();
            const popup = document.createElement('div');
            popup.className = 'xp-popup'; popup.innerText = '+15 XP';
            popup.style.left = (rect.left + rect.width/2) + 'px';
            popup.style.top = rect.top + 'px';
            document.body.appendChild(popup);
            setTimeout(()=>popup.remove(), 1000);

            let { xp, lvl, history, streaks } = userState;
            xp += 15; if(xp >= 700) { xp = 0; lvl++; confetti(); }
            if(!streaks) streaks = {}; streaks[t] = (streaks[t] || 0) + 1;
            if(!history) history = []; history.unshift({ t, n, d: today });
            await db.ref('users/' + auth.currentUser.uid).update({ xp, lvl, history, streaks });
        }

        // WHEEL LOGIC
        function setupWheel() {
            const wheel = document.getElementById('wheel'), arc = 360 / sidequests.length;
            wheel.innerHTML = '';
            sidequests.forEach((q, i) => {
                const seg = document.createElement('div');
                seg.className = 'segment';
                seg.style.background = i % 2 === 0 ? '#22c55e' : '#fbbf24';
                seg.style.transform = `rotate(${i * arc}deg) skewY(${arc - 90}deg)`;
                wheel.appendChild(seg);
            });
        }

        let curRot = 0;
        function spinWheel() {
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            curRot += 1800 + (Math.random() * 360);
            document.getElementById('wheel').style.transform = `rotate(${curRot}deg)`;
            setTimeout(() => {
                const actualDegree = curRot % 360;
                const index = Math.floor((360 - actualDegree) / (360 / sidequests.length)) % sidequests.length;
                document.getElementById('quest-display').innerText = sidequests[index];
                confetti(); btn.disabled = false;
            }, 3000);
        }

        function openQuestModal() {
            document.getElementById('quest-edit-list').innerHTML = sidequests.map((q,i)=>`
                <div style="display:flex; justify-content:space-between; margin:5px 0;">
                    <span>${q}</span><button onclick="sidequests.splice(${i},1);openQuestModal();setupWheel();" style="width:auto; padding:2px 8px; background:red;">X</button>
                </div>`).join('');
            document.getElementById('questModal').style.display='flex';
        }

        function addCustomQuest() {
            const val = document.getElementById('new-quest-input').value;
            if(val) { sidequests.push(val); document.getElementById('new-quest-input').value=""; openQuestModal(); setupWheel(); }
        }

        // SETTINGS
        async function applyCustomColor() {
            const col = document.getElementById('custom-bg').value;
            if(/^#[0-9A-F]{6}$/i.test(col)) {
                document.body.style.backgroundColor = col;
                await db.ref('users/' + auth.currentUser.uid).update({ customBg: col });
            } else { alert("Use Hex format (e.g. #1a1a1a)"); }
        }

        async function updateProfile() {
            const name = document.getElementById('set-name').value;
            const font = document.getElementById('font-select').value;
            await db.ref('users/' + auth.currentUser.uid).update({ name, font });
            alert("Saved!");
        }

        async function handleAuth(type) {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(type==='signup') {
                const res = await auth.createUserWithEmailAndPassword(e,p);
                await db.ref('users/'+res.user.uid).set({ name:"Warrior", xp:0, lvl:1, history:[], streaks:{}, squadId:"", font:"'Segoe UI', sans-serif" });
            } else { await auth.signInWithEmailAndPassword(e,p); }
        }

        async function createSquad() { const code = Math.random().toString(36).substring(2,8).toUpperCase(); await db.ref('users/'+auth.currentUser.uid).update({ squadId: code }); }
        async function joinSquad() { const code = document.getElementById('squad-input').value.toUpperCase(); await db.ref('users/'+auth.currentUser.uid).update({ squadId: code }); }
        async function leaveSquad() { if(confirm("Leave?")) await db.ref('users/'+auth.currentUser.uid).update({ squadId: "" }); }
    </script>
</body>
</html>
