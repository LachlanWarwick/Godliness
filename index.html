<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ALFRED v26.0 - OMNI PROTOCOL</title>
    <style>
        :root { 
            --glow: #00f2ff; 
            --bg: #000b14; 
            --hologram: rgba(0, 242, 255, 0.1); 
            --red: #ff3c3c;
            --panel-bg: rgba(0, 20, 35, 0.7);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
        
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at center, #001a2c 0%, var(--bg) 100%);
            color: var(--glow); 
            font-family: 'Syncopate', 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        #init-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 100; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 1s ease-in-out; 
        }

        #init-btn { 
            border: 1px solid var(--glow); padding: 25px 50px; 
            color: var(--glow); background: transparent; 
            text-transform: uppercase; letter-spacing: 8px; 
            cursor: pointer; box-shadow: 0 0 20px var(--hologram);
            transition: 0.3s;
            font-weight: bold;
        }

        #init-btn:hover { background: var(--glow); color: var(--bg); box-shadow: 0 0 40px var(--glow); }

        #main-container { 
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            width: 100%; gap: 30px; z-index: 5;
        }

        #arc-reactor { 
            width: 160px; height: 160px; 
            border: 3px solid var(--glow); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 3rem; text-shadow: 0 0 20px var(--glow); 
            box-shadow: 0 0 30px var(--hologram), inset 0 0 20px var(--hologram); 
            cursor: pointer; position: relative; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        #arc-reactor.active { 
            box-shadow: inset 0 0 60px var(--glow), 0 0 50px var(--glow); 
            transform: scale(1.1);
        }

        .ring { 
            position: absolute; width: 130%; height: 130%; 
            border: 2px solid var(--hologram); border-radius: 50%; 
            border-top: 3px solid var(--glow); 
            animation: spin 3s linear infinite; 
        }
        
        .ring-inner {
            position: absolute; width: 115%; height: 115%; 
            border: 1px dashed var(--glow); border-radius: 50%; 
            opacity: 0.3; animation: spin 8s linear reverse infinite;
        }

        #display-panel { 
            width: 85%; max-width: 400px;
            padding: 20px;
            background: var(--panel-bg);
            border: 1px solid var(--hologram);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #output { 
            font-size: 1rem; font-weight: 300; min-height: 40px; 
            line-height: 1.4; color: #e0faff; 
        }

        #controls { display: flex; gap: 12px; margin-top: 10px; }

        .mode-btn { 
            background: rgba(0, 242, 255, 0.05); border: 1px solid var(--hologram); 
            color: var(--glow); font-size: 0.65rem; padding: 8px 15px; 
            border-radius: 20px; cursor: pointer; text-transform: uppercase;
            transition: 0.3s;
        }

        .mode-btn.on { background: var(--glow); color: var(--bg); box-shadow: 0 0 15px var(--glow); }

        #log-container { 
            width: 100%; height: 150px; 
            background: rgba(0, 5, 10, 0.9); 
            border-top: 1px solid var(--glow); 
            overflow-y: auto; padding: 15px; 
            font-family: 'Courier New', monospace; font-size: 0.7rem; 
            color: var(--glow); opacity: 0.8; 
            z-index: 10;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="init-screen">
        <h2 style="letter-spacing: 5px; margin-bottom: 30px; opacity: 0.8;">SYSTEM OFFLINE</h2>
        <button id="init-btn">Initialize Protocol</button>
    </div>

    <div id="main-container">
        <div id="arc-reactor">
            <div class="ring"></div>
            <div class="ring-inner"></div>
            A
        </div>
        
        <div id="display-panel">
            <div id="output">"Awaiting voice commands..."</div>
            <div id="controls">
                <button id="auto-mode" class="mode-btn">AUTO-LISTEN: OFF</button>
                <button id="brief-btn" class="mode-btn">SYSTEM BRIEFING</button>
            </div>
        </div>
    </div>

    <div id="log-container"></div>

    <script>
        // API KEYS (Keep your existing logic)
        const GK_A = "gsk_", GK_B = "zWqULWs5POPr7KPFqUp5WGdyb3FYF5mORx3bOk6Lz9l3LFOfsdta";
        const OK_A = "sk-proj-", OK_B = "1iJ4z-Ut_aTNd3oP3FUjb_23Tc6ngugMShPm9ppNrM7b1Ng7IuwPAltinvmPry0exPvhY-eEr1T3BlbkFJ7-06AAOmNaQE14RhUBD4-5PVNI-7gM3U75dBjzy31tovHzWzCm-kny2LbuIhmK24M9SZh90BsA";
        const F_GK = GK_A + GK_B, F_OK = OK_A + OK_B;

        const output = document.getElementById('output'), reactor = document.getElementById('arc-reactor'), logBox = document.getElementById('log-container'), autoBtn = document.getElementById('auto-mode');
        let mediaRecorder, chunks = [], isAuto = false, history = [];
        let userNotes = JSON.parse(localStorage.getItem('alfredNotes')) || [];

        function addLog(msg) {
            const entry = document.createElement('div');
            entry.innerHTML = `<span style="color:rgba(255,255,255,0.3)">[${new Date().toLocaleTimeString([], {hour12: false})}]</span> > ${msg}`;
            logBox.prepend(entry);
        }

        autoBtn.onclick = () => { isAuto = !isAuto; autoBtn.innerText = `AUTO-LISTEN: ${isAuto ? 'ON' : 'OFF'}`; autoBtn.classList.toggle('on'); };

        // INITIALIZATION (Permissions are requested here)
        document.getElementById('init-btn').onclick = async () => {
            addLog("INITIALIZING SYSTEMS...");
            
            // 1. Audio Context
            const ctx = new (window.AudioContext || window.webkitAudioContext)(); ctx.resume();
            
            // 2. Request Mic Permission immediately to 'warm up' the system
            try { await navigator.mediaDevices.getUserMedia({ audio: true }); addLog("MIC: READY"); } catch(e) { addLog("MIC: DENIED"); }

            // 3. Request Geolocation Permission
            navigator.geolocation.getCurrentPosition(() => addLog("GPS: LOCKED"), () => addLog("GPS: UNAVAILABLE"));

            document.getElementById('init-screen').style.opacity = '0';
            setTimeout(() => { 
                document.getElementById('init-screen').style.display = 'none';
                speak("Omni protocol active. All systems nominal. How may I assist you, Sir?");
            }, 1000);
        };

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            msg.voice = voices.find(v => v.name.includes('Google UK English Male') || v.lang.includes('GB')) || voices[0];
            msg.rate = 1.0;
            msg.pitch = 0.9;
            msg.onstart = () => reactor.classList.add('active');
            msg.onend = () => { 
                reactor.classList.remove('active');
                if(isAuto) setTimeout(startListening, 600); 
            };
            window.speechSynthesis.speak(msg);
            addLog(`ALFRED: ${text}`);
            history.push({role: "assistant", content: text});
        }

        async function runBriefing() {
            output.innerText = "Scanning environment...";
            try {
                const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                
                // Battery Check
                let bLevel = "Unknown";
                if ('getBattery' in navigator) {
                    const bat = await navigator.getBattery();
                    bLevel = Math.round(bat.level * 100);
                }
                
                // Location & Weather
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    try {
                        const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current_weather=true`);
                        const wData = await wRes.json();
                        const temp = Math.round(wData.current_weather.temperature);
                        
                        let brief = `Good day, Sir. It is ${time}. Battery is at ${bLevel} percent. Outside it is ${temp} degrees celsius.`;
                        speak(brief);
                    } catch(err) {
                        speak(`System check complete. Time is ${time}, battery at ${bLevel} percent. Weather data stream interrupted.`);
                    }
                }, () => {
                    speak(`It is ${time}. Battery is ${bLevel} percent. Geolocation permissions required for weather.`);
                });
            } catch(e) { speak("Briefing failed. Local permissions required."); }
        }

        // VOICE CAPTURE
        async function startListening() {
            if(window.speechSynthesis.speaking) return;
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(s); chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => processVoice(new Blob(chunks, { type: 'audio/mp4' }));
                mediaRecorder.start(); 
                output.innerText = "Listening...";
                addLog("LISTENING...");
            } catch(e) { addLog("MIC_ERROR: Check Permissions"); }
        }

        // (Remaining logic for processing voice and Groq remains the same)
        async function processVoice(blob) {
            output.innerText = "Analyzing audio...";
            const fd = new FormData(); fd.append("file", blob, "audio.m4a"); fd.append("model", "whisper-1");
            try {
                const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
                    method: "POST", headers: { "Authorization": `Bearer ${F_OK}` }, body: fd
                });
                const data = await res.json();
                const cmd = data.text.toLowerCase().trim();
                addLog(`USER: ${cmd}`);
                history.push({role: "user", content: data.text});

                if (cmd.includes("time")) { speak(`The time is ${new Date().toLocaleTimeString()}.`); return; }
                if (cmd.includes("briefing") || cmd.includes("my day")) { runBriefing(); return; }

                const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", headers: { "Authorization": `Bearer ${F_GK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "system", content: "You are ALFRED, a polite British AI butler. Be concise."}, ...history]
                    })
                });
                const gData = await groqRes.json();
                const reply = gData.choices[0].message.content;
                output.innerText = reply; speak(reply);
            } catch(e) { output.innerText = "Link failed."; }
        }

        reactor.onmousedown = reactor.ontouchstart = (e) => { e.preventDefault(); if(!isAuto) startListening(); };
        reactor.onmouseup = reactor.ontouchend = (e) => { e.preventDefault(); if(!isAuto && mediaRecorder?.state === "recording") mediaRecorder.stop(); };
        document.getElementById('brief-btn').onclick = () => runBriefing();
    </script>
</body>
</html>
