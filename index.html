<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ARTHUR v7.5</title>
    <style>
        :root { --glow: #00f2ff; --bg: #000b14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--glow); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: space-around; height: 100vh; margin: 0; overflow: hidden; padding: 40px 0; }
        
        #arc-reactor { width: 160px; height: 160px; border: 2px solid var(--glow); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 4rem; text-shadow: 0 0 15px var(--glow); box-shadow: inset 0 0 20px var(--glow), 0 0 15px var(--glow); cursor: pointer; position: relative; z-index: 5; }
        .ring { position: absolute; width: 110%; height: 110%; border: 1px solid var(--glow); border-radius: 50%; border-top-color: transparent; animation: spin 2s linear infinite; opacity: 0.4; }

        #display-panel { width: 85%; text-align: center; border-top: 1px solid var(--glow); border-bottom: 1px solid var(--glow); padding: 25px 10px; min-height: 160px; background: rgba(0, 242, 255, 0.03); }
        #status { font-size: 0.65rem; letter-spacing: 4px; font-weight: bold; margin-bottom: 10px; color: #fff; }
        #output { font-size: 1rem; font-style: italic; }

        #vault-icon { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; opacity: 0.4; cursor: pointer; z-index: 10; }
        #config-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #001520; border: 2px solid var(--glow); padding: 30px; border-radius: 15px; width: 85%; z-index: 100; box-shadow: 0 0 100px #000; }
        input { width: 100%; background: #000; border: 1px solid var(--glow); color: var(--glow); margin: 15px 0; padding: 12px; font-family: monospace; border-radius: 5px; }
        #save-btn { background: var(--glow); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="vault-icon" onclick="toggleVault()">⚙️</div>

    <div id="config-panel">
        <h3 style="margin-top:0">SECURE VAULT</h3>
        <label>GROQ KEY:</label>
        <input type="password" id="groq-input" placeholder="gsk_...">
        <label>OPENAI KEY:</label>
        <input type="password" id="openai-input" placeholder="sk-...">
        <button id="save-btn" onclick="saveKeys()">INITIALIZE LINKS</button>
    </div>

    <div id="arc-reactor">
        <div class="ring"></div>
        A
    </div>

    <div id="display-panel">
        <div id="status">NEURAL_LINK_READY</div>
        <div id="output">"Awaiting initialization, Sir."</div>
    </div>

    <script>
        const status = document.getElementById('status');
        const output = document.getElementById('output');
        const reactor = document.getElementById('arc-reactor');
        let mediaRecorder, audioChunks = [];

        function toggleVault() {
            const panel = document.getElementById('config-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function saveKeys() {
            localStorage.setItem('groq_key', document.getElementById('groq-input').value.trim());
            localStorage.setItem('openai_key', document.getElementById('openai-input').value.trim());
            toggleVault();
            status.innerText = "LINK: ONLINE";
            output.innerText = "System ready. Hold 'A' to speak.";
        }

        async function processVoice(blob, oKey, gKey) {
            status.innerText = "UPLOADING...";
            const cleanOKey = oKey.replace(/[\u2013\u2014]/g, "-");
            const cleanGKey = gKey.replace(/[\u2013\u2014]/g, "-");

            const formData = new FormData();
            formData.append("file", blob, "recording.m4a");
            formData.append("model", "whisper-1");

            try {
                const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${cleanOKey}` },
                    body: formData,
                    mode: 'cors'
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error.message || "Network Error");
                }

                const data = await res.json();
                think(data.text, cleanGKey);
            } catch(e) {
                status.innerText = "EARS_ERROR";
                output.innerText = e.message === "Load failed" ? "VPN/ADBLOCK DETECTED. PLEASE DISABLE." : "Diagnostic: " + e.message;
            }
        }

        async function think(text, gKey) {
            status.innerText = "THINKING...";
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${gKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{role:"system", content:"You are ARTHUR, a dry-witted British AI. Formal. Max 15 words."}, {role:"user", content: text}]
                    })
                });
                const data = await res.json();
                const reply = data.choices.message.content;
                output.innerText = reply;
                speak(reply);
                status.innerText = "LINK: STANDBY";
            } catch(e) { 
                status.innerText = "BRAIN_ERROR";
                output.innerText = "Diagnostic: " + e.message;
            }
        }

        async function startListening() {
            const gKey = localStorage.getItem('groq_key');
            const oKey = localStorage.getItem('openai_key');
            if(!gKey || !oKey) { toggleVault(); return; }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.start();
                status.innerText = "LISTENING...";
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/mp4' });
                    processVoice(blob, oKey, gKey);
                };
            } catch(e) {
                status.innerText = "MIC_BLOCK";
                output.innerText = "Enable Mic in Safari Settings.";
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utter.voice = voices.find(v => v.lang.includes('en-GB')) || voices;
            window.speechSynthesis.speak(utter);
        }

        reactor.addEventListener('touchstart', (e) => { e.preventDefault(); startListening(); });
        reactor.addEventListener('touchend', () => { if(mediaRecorder) mediaRecorder.stop(); });
        document.body.addEventListener('click', () => { window.speechSynthesis.getVoices(); }, {once: true});
    </script>
</body>
</html>
