<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GODLINESS Ascension</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style id="theme-style">
        :root { 
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #fbbf24; 
            --secondary: #22c55e; --accent: #3b82f6; --danger: #ef4444; --font-main: sans-serif;
            --anim-speed: 0.3s;
        }
        .light-mode { --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --primary: #d97706; --accent: #2563eb; }
        .midnight-mode { --bg: #000000; --card: #111111; --text: #ffffff; --primary: #ffd700; --accent: #ffffff; }
        
        body { 
            background: var(--bg); color: var(--text); font-family: var(--font-main); 
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; 
            transition: background var(--anim-speed), color var(--anim-speed); min-height: 100vh;
            overflow-x: hidden; /* Fixes tabs going off page */
        }

        .hidden { display: none !important; }
        .container { width: 100%; max-width: 400px; padding-bottom: 50px; position: relative; box-sizing: border-box; }
        
        /* XP Popup Animation */
        @keyframes xpFloat { 0% { opacity: 0; transform: translateY(0); } 20% { opacity: 1; } 100% { opacity: 0; transform: translateY(-50px); } }
        .xp-popup { position: fixed; color: var(--primary); font-weight: 900; font-size: 1.5rem; pointer-events: none; z-index: 1000; animation: xpFloat 1s ease-out forwards; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        .stats-card, .box, .task-item { 
            background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; 
            border: 1px solid rgba(255,255,255,0.05); overflow: hidden;
        }

        /* Task Styling */
        .task-item { display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: transform 0.1s; }
        .task-item:active { transform: scale(0.98); }
        .task-item.done { border-color: var(--secondary); background: rgba(34, 197, 94, 0.1); }
        .streak-fire { color: #f97316; font-weight: bold; }

        /* Restored Wheel UI */
        .wheel-outer { position: relative; width: 220px; height: 220px; margin: 20px auto; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 5px solid var(--accent); position: relative; overflow: hidden; transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1); }
        .segment { position: absolute; width: 50%; height: 50%; top: 0; left: 50%; transform-origin: 0% 100%; }
        .pointer { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #ef4444; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); z-index: 10; }

        /* Progress Bar */
        .progress-container { background: rgba(255,255,255,0.1); height: 14px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #progress-bar { background: linear-gradient(90deg, var(--primary), #fcd34d); height: 100%; width: 0%; transition: width 0.8s ease-out; }

        /* Modal Overhaul */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); padding: 25px; border-radius: 25px; width: 90%; max-width: 380px; max-height: 85vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        
        button { background: var(--primary); border: none; padding: 14px; border-radius: 50px; font-weight: 800; color: #000; cursor: pointer; width: 100%; margin: 8px 0; }
        .lb-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: rgba(0,0,0,0.2); color: #fff; box-sizing: border-box; }
        .light-mode input, .light-mode select { background: #eee; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        
        <div id="auth-screen">
            <h1 style="text-align:center; color:var(--primary);">GODLINESS</h1>
            <div class="box">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Password">
                <button onclick="handleAuth('login')">Login</button>
                <button style="background:transparent; color:var(--primary); border:2px solid var(--primary);" onclick="handleAuth('signup')">Sign Up</button>
            </div>
        </div>

        <div id="squad-screen" class="hidden">
            <h2 style="text-align:center;">Join your Squad</h2>
            <div class="box">
                <input type="text" id="squad-input" placeholder="Squad Code">
                <button onclick="joinSquad()">Join Squad</button>
                <button style="background:var(--accent); color:white;" onclick="createSquad()">Create Squad</button>
            </div>
        </div>

        <div id="app-screen" class="hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div id="display-name" style="font-weight:900;">Warrior</div>
                <div style="display:flex; gap:10px;">
                    <button onclick="document.getElementById('achieveModal').style.display='flex'" style="width:auto; padding:10px 15px;">🏆</button>
                    <button onclick="document.getElementById('settingsModal').style.display='flex'" style="width:auto; background:none; color:inherit; font-size:1.8rem; padding:0;">⚙️</button>
                </div>
            </div>

            <div class="stats-card">
                <h2 id="user-rank" style="text-align:center; margin:0;">Level 1</h2>
                <div class="progress-container"><div id="progress-bar"></div></div>
                <div style="text-align:center; font-weight:bold;">XP: <span id="xp-display">0</span> / 700</div>
            </div>

            <div id="task-container"></div>

            <div class="box" style="text-align:center;">
                <h3>Sidequest Wheel</h3>
                <div class="wheel-outer"><div class="pointer"></div><div id="wheel"></div></div>
                <div id="quest-display" style="min-height:20px; margin-bottom:10px; font-weight:bold; color:var(--primary);"></div>
                <button id="spin-btn" onclick="spinWheel()">SPIN FOR XP</button>
            </div>

            <div class="box">
                <h3 style="text-align:center;">Leaderboard</h3>
                <div id="leaderboard-list"></div>
            </div>

            <div class="box">
                <h3 style="text-align:center;">Squad Activity</h3>
                <div id="friends-list"></div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal" onclick="this.style.display='none'"><div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="margin-top:0;">Warrior Settings</h2>
        <label>Display Name</label><input type="text" id="set-name">
        <label>Visual Theme</label>
        <select id="theme-select">
            <option value="dark">Dark Slate</option>
            <option value="light">Light Mode</option>
            <option value="midnight">Midnight Gold</option>
        </select>
        <label>Font Style</label>
        <select id="font-select">
            <option value="sans-serif">Modern Sans</option>
            <option value="serif">Classic Serif</option>
            <option value="monospace">Warrior Mono</option>
        </select>
        <label>Animations</label>
        <select id="anim-select">
            <option value="0.3s">Normal</option>
            <option value="0.1s">Fast</option>
            <option value="0s">Off</option>
        </select>
        <button onclick="updateProfile()">Save Settings</button>
        <button style="background:var(--danger); color:white;" onclick="leaveSquad()">Leave Squad</button>
        <button style="background:#475569; color:white;" onclick="auth.signOut()">Logout</button>
        <button onclick="document.getElementById('settingsModal').style.display='none'" style="background:none; color:var(--text);">Close</button>
    </div></div>

    <div id="achieveModal" class="modal" onclick="this.style.display='none'"><div class="modal-content" onclick="event.stopPropagation()"><h2>Trophies</h2><div id="achievements-full-list"></div><button onclick="document.getElementById('achieveModal').style.display='none'">Close</button></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAwJEP9IzCqyaNKQBjJohPEmykTpSBL5l4",
            authDomain: "godliness-bd3f8.firebaseapp.com",
            projectId: "godliness-bd3f8",
            storageBucket: "godliness-bd3f8.firebasestorage.app",
            messagingSenderId: "520495643556",
            appId: "1:520495643556:web:e107bee032556f9ed89f31",
            databaseURL: "https://godliness-bd3f8-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        const taskDefs = [
            {l:'G', t:'Gratitude', s:'Name 3 blessings'}, {l:'O', t:'Outreach', s:'Kindness/service'},
            {l:'D', t:'Discipline', s:'Workout/hard task'}, {l:'L', t:'Listen', s:'Quiet time/prayer'},
            {l:'I', t:'Imagine', s:'Creative work'}, {l:'N', t:'New Ground', s:'Learn a fact'},
            {l:'E', t:'Examine', s:'Scripture/study'}, {l:'S', t:'Sidequest', s:'Spin the wheel'},
            {l:'S', t:'Self-Reflect', s:'Nightly recap'}
        ];

        let userState = null;
        let sidequests = ["Solo: Hold pose 60s", "Squad: Group FREEZE", "Solo: 10 Pushups", "Squad: Sync Walk"];

        auth.onAuthStateChanged(user => {
            if(user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    userState = snap.val();
                    if(userState) {
                        applyVisuals(userState.theme, userState.font, userState.animSpeed);
                        if(!userState.squadId) {
                            document.getElementById('auth-screen').classList.add('hidden');
                            document.getElementById('app-screen').classList.add('hidden');
                            document.getElementById('squad-screen').classList.remove('hidden');
                        } else {
                            document.getElementById('auth-screen').classList.add('hidden');
                            document.getElementById('squad-screen').classList.add('hidden');
                            document.getElementById('app-screen').classList.remove('hidden');
                            showApp();
                        }
                    }
                });
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('squad-screen').classList.add('hidden');
            }
        });

        function showApp() {
            document.getElementById('display-name').innerText = userState.name;
            document.getElementById('xp-display').innerText = userState.xp;
            document.getElementById('user-rank').innerText = `Level ${userState.lvl}`;
            document.getElementById('set-name').value = userState.name;
            
            setTimeout(() => { document.getElementById('progress-bar').style.width = (userState.xp / 7) + '%'; }, 100);
            
            // Render Tasks
            const today = new Date().toLocaleDateString();
            const historyArr = userState.history || [];
            const doneToday = historyArr.filter(h => h.d === today).map(h => h.t);
            
            document.getElementById('task-container').innerHTML = taskDefs.map(item => `
                <div class="task-item ${doneToday.includes(item.t) ? 'done' : ''}" onclick="logTask('${item.t}', event)">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <div style="font-size:1.6rem; font-weight:900; color:var(--primary); width:30px; text-align:center;">${item.l}</div>
                        <div><b>${item.t}</b><br><small style="opacity:0.7;">${item.s}</small></div>
                    </div>
                    <div class="streak-fire">🔥 ${userState.streaks?.[item.t] || 0}</div>
                </div>`).join('');

            // Wheel Setup
            setupWheel();

            // Leaderboard
            db.ref('users').orderByChild('squadId').equalTo(userState.squadId).on('value', snap => {
                const members = Object.values(snap.val() || {});
                const lb = document.getElementById('leaderboard-list');
                const fl = document.getElementById('friends-list');
                lb.innerHTML = members.sort((a,b) => b.lvl - a.lvl || b.xp - a.xp).map((m, i) => `
                    <div class="lb-row">
                        <span>#${i+1} <b>${m.name}</b></span>
                        <div><span style="opacity:0.6; font-size:0.8rem;">Lvl ${m.lvl}</span> <span style="color:var(--primary); font-weight:bold; font-size:0.8rem;">${m.xp} XP</span></div>
                    </div>`).join('');

                fl.innerHTML = members.map(m => `
                    <div class="date-header" onclick="this.nextElementSibling.classList.toggle('hidden')">👤 ${m.name}</div>
                    <div class="hidden" style="margin-left:15px; border-left:2px solid var(--primary); padding-left:10px;">
                        ${buildHistoryHtml(m.history)}
                    </div>`).join('');
            });
        }

        async function logTask(t, event) {
            const today = new Date().toLocaleDateString();
            if(userState.history && userState.history.some(h => h.t === t && h.d === today)) return;
            const n = prompt(`Log for ${t}:`); if(!n) return;

            showXPPopup(event.clientX || event.touches.clientX, event.clientY || event.touches.clientY);

            let { xp, lvl, history, streaks } = userState;
            xp += 15; if(xp >= 700) { xp = 0; lvl++; confetti(); }
            if(!streaks) streaks = {}; streaks[t] = (streaks[t] || 0) + 1;
            if(!history) history = []; history.unshift({ t, n, d: today });
            await db.ref('users/' + auth.currentUser.uid).update({ xp, lvl, history, streaks });
        }

        function setupWheel() {
            const wheel = document.getElementById('wheel'), arc = 360 / sidequests.length;
            wheel.innerHTML = '';
            sidequests.forEach((q, i) => {
                const seg = document.createElement('div');
                seg.className = 'segment';
                seg.style.background = i % 2 === 0 ? '#22c55e' : '#fbbf24';
                seg.style.transform = `rotate(${i * arc}deg) skewY(${arc - 90}deg)`;
                wheel.appendChild(seg);
            });
        }

        let curRot = 0;
        function spinWheel() {
            const btn = document.getElementById('spin-btn'); btn.disabled = true;
            curRot += 1800 + (Math.random() * 360);
            document.getElementById('wheel').style.transform = `rotate(${curRot}deg)`;
            setTimeout(() => { 
                confetti(); btn.disabled = false;
                const index = Math.floor(((360 - (curRot % 360)) % 360) / (360 / sidequests.length));
                document.getElementById('quest-display').innerText = sidequests[index];
            }, 3000);
        }

        function showXPPopup(x, y) {
            const p = document.createElement('div'); p.className = 'xp-popup'; p.innerText = '+15 XP';
            p.style.left = (x - 20) + 'px'; p.style.top = (y - 20) + 'px';
            document.body.appendChild(p); setTimeout(() => p.remove(), 1000);
        }

        function applyVisuals(theme, font, anim) {
            document.body.className = theme === 'light' ? 'light-mode' : (theme === 'midnight' ? 'midnight-mode' : '');
            document.body.style.setProperty('--font-main', font || 'sans-serif');
            document.body.style.setProperty('--anim-speed', anim || '0.3s');
            document.getElementById('theme-select').value = theme || 'dark';
            document.getElementById('font-select').value = font || 'sans-serif';
            document.getElementById('anim-select').value = anim || '0.3s';
        }

        async function updateProfile() {
            await db.ref('users/' + auth.currentUser.uid).update({
                name: document.getElementById('set-name').value,
                theme: document.getElementById('theme-select').value,
                font: document.getElementById('font-select').value,
                animSpeed: document.getElementById('anim-select').value
            });
        }

        function buildHistoryHtml(arr) {
            if(!arr || !arr.length) return "<p style='padding:5px; opacity:0.5;'>No logs.</p>";
            return arr.slice(0, 5).map(h => `<p style='font-size:0.75rem; margin:5px 0;'><b>${h.t}:</b> ${h.n} <span style='opacity:0.5'>(${h.d})</span></p>`).join('');
        }

        async function handleAuth(type) {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(type === 'signup') {
                const res = await auth.createUserWithEmailAndPassword(e, p);
                await db.ref('users/' + res.user.uid).set({ name: "Warrior", xp: 0, lvl: 1, history: [], streaks: {}, squadId: "", theme: "dark", font: "sans-serif", animSpeed: "0.3s" });
            } else { await auth.signInWithEmailAndPassword(e, p); }
        }

        async function createSquad() { const code = Math.random().toString(36).substring(2, 8).toUpperCase(); await db.ref('users/' + auth.currentUser.uid).update({ squadId: code }); }
        async function joinSquad() { const code = document.getElementById('squad-input').value.toUpperCase(); await db.ref('users/' + auth.currentUser.uid).update({ squadId: code }); }
        async function leaveSquad() { if(confirm("Leave squad?")) await db.ref('users/' + auth.currentUser.uid).update({ squadId: "" }); }
    </script>
</body>
</html>
