<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTHUR v13.0</title>
    <style>
        body { background: #000b14; color: #00f2ff; font-family: sans-serif; text-align: center; padding-top: 50px; margin: 0; overflow: hidden; }
        
        #arc-reactor { 
            width: 180px; height: 180px; 
            border: 5px solid #00f2ff; border-radius: 50%; 
            background: none; color: #00f2ff; font-size: 5rem;
            cursor: pointer; display: inline-block;
            transition: all 0.2s ease;
            -webkit-user-select: none; 
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        .active-glow { 
            background: rgba(0, 242, 255, 0.2) !important; 
            box-shadow: 0 0 40px #00f2ff, inset 0 0 20px #00f2ff; 
            transform: scale(1.05);
        }

        #output { margin-top: 30px; color: white; padding: 20px; font-style: italic; min-height: 80px; line-height: 1.5; font-size: 1.1rem; }
        #status { margin-top: 15px; font-weight: bold; letter-spacing: 3px; font-size: 0.7rem; color: #00f2ff; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="arc-reactor">A</div>
    <div id="status">V13.0 STABILIZED</div>
    <div id="output">"Hold the A to speak, Sir."</div>

    <script>
        const GK_1 = "gsk_", GK_2 = "zWqULWs5POPr7KPFqUp5WGdyb3FYF5mORx3bOk6Lz9l3LFOfsdta";
        const OK_1 = "sk-proj-", OK_2 = "1iJ4z-Ut_aTNd3oP3FUjb_23Tc6ngugMShPm9ppNrM7b1Ng7IuwPAltinvmPry0exPvhY-eEr1T3BlbkFJ7-06AAOmNaQE14RhUBD4-5PVNI-7gM3U75dBjzy31tovHzWzCm-kny2LbuIhmK24M9SZh90BsA";

        const reactor = document.getElementById('arc-reactor');
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        let mediaRecorder, chunks = [];

        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = process;
                mediaRecorder.start();
                reactor.classList.add('active-glow');
                status.innerText = "LISTENING";
            } catch (e) { status.innerText = "MIC ERROR"; }
        }

        function stop() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                reactor.classList.remove('active-glow');
                status.innerText = "PROCESSING";
            }
        }

        async function process() {
            const blob = new Blob(chunks, { type: 'audio/webm' }); 
            const fd = new FormData();
            fd.append("file", blob, "rec.webm");
            fd.append("model", "whisper-1");

            try {
                // OpenAI - Whisper
                const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
                    method: "POST", headers: { "Authorization": `Bearer ${OK_1 + OK_2}` }, body: fd
                });
                const data = await res.json();
                if (!data?.text) throw new Error("Whisper: " + (data?.error?.message || "No speech."));

                output.innerText = `"${data.text}"`;

                // Groq - Llama 3.1 8B (Fastest Free Model)
                const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GK_1 + GK_2}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{role:"system", content:"You are ARTHUR. Dry wit. Max 10 words. Sir."}, {role:"user", content: data.text}]
                    })
                });
                
                const groqData = await groqRes.json();
                
                // THE GROQ FIX: Checking every layer before accessing content
                const reply = groqData?.choices?.?.message?.content;

                if (reply) {
                    output.innerText = reply;
                    const u = new SpeechSynthesisUtterance(reply);
                    u.lang = 'en-GB';
                    window.speechSynthesis.speak(u);
                    status.innerText = "READY";
                } else {
                    // This catches the specific error message from the Groq API
                    const apiError = groqData?.error?.message || "Brain returned empty choices.";
                    throw new Error("Groq API: " + apiError);
                }
            } catch (e) { 
                output.innerText = "Alert: " + e.message; 
                status.innerText = "READY";
            }
        }

        // Standard v10 Touch Binding
        reactor.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
        reactor.addEventListener('touchend', (e) => { e.preventDefault(); stop(); });
        
        // Audio engine handshake
        document.addEventListener('touchstart', () => { window.speechSynthesis.getVoices(); }, {once: true});
    </script>
</body>
</html>
