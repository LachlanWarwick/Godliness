<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARTHUR v8.1</title>
    <style>
        :root { --glow: #00f2ff; --bg: #000; }
        body { background: var(--bg); color: var(--glow); font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #core { width: 150px; height: 150px; border: 3px solid var(--glow); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; box-shadow: 0 0 20px var(--glow); cursor: pointer; -webkit-user-select: none; }
        #status { margin-top: 30px; font-size: 0.8rem; letter-spacing: 2px; text-align: center; width: 80%; }
        #vault { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; opacity: 0.3; }
        #panel { display: none; position: fixed; background: #111; border: 1px solid var(--glow); padding: 20px; width: 80%; z-index: 10; }
        input { width: 100%; background: #000; border: 1px solid var(--glow); color: var(--glow); margin: 10px 0; padding: 10px; }
    </style>
</head>
<body>

<div id="vault" onclick="v()">⚙️</div>
<div id="panel" id="p">
    <input type="password" id="gk" placeholder="Groq Key">
    <input type="password" id="ok" placeholder="OpenAI Key">
    <button onclick="s()" style="width:100%; background:var(--glow); border:none; padding:10px; font-weight:bold;">SYNC</button>
</div>

<div id="core" id="c">A</div>
<div id="status" id="st">READY</div>

<script>
    let rec, chunks = [];
    const st = document.getElementById('status');

    function v() { const p = document.getElementById('panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
    function s() { localStorage.setItem('gk', document.getElementById('gk').value.trim()); localStorage.setItem('ok', document.getElementById('ok').value.trim()); v(); st.innerText = "LINKED"; }

    async function process(blob) {
        st.innerText = "UPLOADING...";
        const ok = localStorage.getItem('ok'), gk = localStorage.getItem('gk');
        const fd = new FormData();
        fd.append("file", blob, "audio.m4a");
        fd.append("model", "whisper-1");

        try {
            // v8.1: Purest Fetch call possible
            const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
                method: "POST",
                headers: { "Authorization": "Bearer " + ok },
                body: fd
            });
            const data = await res.json();
            think(data.text, gk);
        } catch(e) { st.innerText = "LOAD FAILED: DISABLE PRIVATE RELAY"; }
    }

    async function think(t, gk) {
        st.innerText = "THINKING...";
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": "Bearer " + gk, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{role:"system", content:"You are ARTHUR. Max 10 words. Sir."}, {role:"user", content: t}]})
            });
            const d = await res.json();
            const r = d.choices.message.content;
            st.innerText = r;
            const u = new SpeechSynthesisUtterance(r);
            u.voice = window.speechSynthesis.getVoices().find(v => v.lang.includes('en-GB'));
            window.speechSynthesis.speak(u);
        } catch(e) { st.innerText = "BRAIN ERROR"; }
    }

    async function start() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            rec = new MediaRecorder(s);
            chunks = [];
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => process(new Blob(chunks, { type: 'audio/mp4' }));
            rec.start();
            st.innerText = "LISTENING...";
        } catch(e) { st.innerText = "MIC ERROR"; }
    }

    const c = document.getElementById('core');
    c.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
    c.addEventListener('touchend', () => { if(rec) rec.stop(); });
</script>
</body>
</html>
