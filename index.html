<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ARTHUR HUD</title>
    <style>
        :root { --gold: #ffd700; --bg: #000; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            background: var(--bg); color: var(--gold); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden; 
            justify-content: space-between;
            padding: 80px 0 60px 0;
        }

        /* Animated Core */
        #core {
            width: 140px; height: 140px;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .ring {
            position: absolute; width: 100%; height: 100%;
            border: 2px solid var(--gold); border-radius: 50%;
            border-bottom-color: transparent; animation: spin 3s linear infinite;
        }
        #inner-a { font-size: 3.5rem; font-weight: 200; text-shadow: 0 0 15px var(--gold); }

        /* HUD Readout */
        #display {
            width: 85%; text-align: center; background: rgba(255, 215, 0, 0.05);
            border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold); 
            padding: 20px; min-height: 140px; display: flex; flex-direction: column; justify-content: center;
        }
        #status { font-size: 0.7rem; letter-spacing: 4px; margin-bottom: 10px; opacity: 0.7; font-weight: bold; }
        #text { font-size: 1.1rem; line-height: 1.4; text-shadow: 0 0 5px var(--gold); }

        /* Centered Trigger */
        #ptt-container { width: 100%; display: flex; justify-content: center; }
        #ptt-btn {
            width: 110px; height: 110px; border-radius: 50%;
            background: transparent; border: 3px solid var(--gold);
            color: var(--gold); font-size: 0.9rem; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            transition: transform 0.1s;
        }
        #ptt-btn:active { background: var(--gold); color: #000; transform: scale(0.9); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .pulse { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="core">
        <div class="ring"></div>
        <div id="inner-a">A</div>
    </div>

    <div id="display">
        <div id="status">ARTHUR HF-V2 ONLINE</div>
        <div id="text">"System ready, Sir. Tap once to initialize, then hold to speak."</div>
    </div>

    <div id="ptt-container">
        <div id="ptt-btn">HOLD</div>
    </div>

    <script type="module">
        // --- 1. CONFIGURATION ---
        const HF_TOKEN = "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"; 
        const MODEL_URL = "https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta";

        const status = document.getElementById('status');
        const output = document.getElementById('text');
        const btn = document.getElementById('ptt-btn');

        // --- 2. THE BRAIN ---
        async function queryAI(userInput) {
            const response = await fetch(MODEL_URL, {
                headers: { 
                    "Authorization": `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/json"
                },
                method: "POST",
                body: JSON.stringify({
                    inputs: `<s>[INST] You are ARTHUR, a polite British AI for cyberpunk medieval armor. You are formal and call the user 'Sir'. Keep it under 15 words. User: ${userInput} [/INST]`,
                    parameters: { max_new_tokens: 50, return_full_text: false }
                }),
            });
            const result = await response.json();
            
            // HF can return an array or an error object
            if (result.error) throw new Error(result.error);
            
            let reply = result.generated_text || result.generated_text;
            return reply.split('[/INST]').pop().trim();
        }

        // --- 3. THE EARS ---
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.continuous = false;

        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            try { 
                recognition.start(); 
                status.innerText = "LISTENING...";
                status.classList.add('pulse');
            } catch(err) {}
        });

        btn.addEventListener('touchend', () => {
            recognition.stop();
            status.classList.remove('pulse');
            status.innerText = "THINKING...";
        });

        recognition.onresult = async (event) => {
            const transcript = event.results.transcript;
            output.innerText = `"${transcript}"`;

            try {
                const aiReply = await queryAI(transcript);
                output.innerText = aiReply;
                speak(aiReply);
                status.innerText = "ARTHUR STANDBY";
            } catch (err) {
                console.error(err);
                status.innerText = "LINK ERROR";
                output.innerText = "Sir, the neural link is failing. Ensure the token is valid.";
            }
        };

        // --- 4. THE VOICE ---
        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            const voices = synth.getVoices();
            // Try to find British English, otherwise default
            utter.voice = voices.find(v => v.lang.includes('en-GB')) || voices;
            utter.pitch = 0.95;
            utter.rate = 1.0;
            synth.speak(utter);
        }

        // Initialize Audio on first tap (Safari Requirement)
        document.body.addEventListener('click', () => {
            window.speechSynthesis.getVoices();
            output.innerText = "Audio initialized, Sir.";
        }, {once: true});
    </script>
</body>
</html>
