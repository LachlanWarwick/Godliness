<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTHUR: STEALTH CORE</title>
    <style>
        :root { --glow: #00f2ff; --bg: #000; }
        body { background: var(--bg); color: var(--glow); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        #arc-reactor { width: 140px; height: 140px; border: 2px solid var(--glow); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--glow); cursor: pointer; transition: 0.3s; }
        #arc-reactor:active { transform: scale(0.95); box-shadow: 0 0 30px var(--glow); }
        
        #status { margin-top: 20px; font-size: 0.7rem; letter-spacing: 2px; }
        #output { width: 80%; text-align: center; margin-top: 20px; min-height: 40px; font-size: 0.9rem; }

        /* Secret Vault Styling */
        #vault { position: absolute; top: 10px; right: 10px; font-size: 1.5rem; cursor: pointer; opacity: 0.3; }
        #config-panel { display: none; position: absolute; background: #111; border: 1px solid var(--glow); padding: 20px; border-radius: 10px; z-index: 100; width: 80%; }
        input { width: 100%; background: #000; border: 1px solid var(--glow); color: var(--glow); margin: 10px 0; padding: 10px; box-sizing: border-box; }
        button { background: var(--glow); color: #000; border: none; padding: 10px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <div id="vault" onclick="toggleVault()">⚙️</div>

    <div id="config-panel">
        <label>GROQ KEY:</label>
        <input type="password" id="groq-input" placeholder="Paste Groq Key here">
        <label>OPENAI KEY:</label>
        <input type="password" id="openai-input" placeholder="Paste OpenAI Key here">
        <button onclick="saveKeys()">INITIALIZE LINKS</button>
    </div>

    <div id="arc-reactor">A</div>
    <div id="status">NEURAL LINK: LOCKED</div>
    <div id="output">"Awaiting API credentials, Sir."</div>

    <script>
        const status = document.getElementById('status');
        const output = document.getElementById('output');
        const reactor = document.getElementById('arc-reactor');
        let mediaRecorder, audioChunks = [];

        function toggleVault() {
            const panel = document.getElementById('config-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function saveKeys() {
            localStorage.setItem('groq_key', document.getElementById('groq-input').value);
            localStorage.setItem('openai_key', document.getElementById('openai-input').value);
            toggleVault();
            status.innerText = "NEURAL LINK: STANDBY";
            output.innerText = "Credentials accepted. System ready.";
        }

        async function startListening() {
            const gKey = localStorage.getItem('groq_key');
            const oKey = localStorage.getItem('openai_key');
            if(!gKey || !oKey) { toggleVault(); return; }

            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();
            status.innerText = "LISTENING...";
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                processVoice(blob, oKey, gKey);
            };
        }

        async function processVoice(blob, oKey, gKey) {
            status.innerText = "UPLOADING TO EARS...";
            const formData = new FormData();
            formData.append("file", blob, "audio.webm");
            formData.append("model", "whisper-1");

            try {
                const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
                    headers: { "Authorization": `Bearer ${oKey}` },
                    method: "POST",
                    body: formData
                });
                const data = await res.json();
                think(data.text, gKey);
            } catch(e) { status.innerText = "EARS ERROR"; }
        }

        async function think(text, gKey) {
            status.innerText = "ARTHUR THINKING...";
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    headers: { "Authorization": `Bearer ${gKey}`, "Content-Type": "application/json" },
                    method: "POST",
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{role:"system", content:"You are ARTHUR, a British AI. Formal. Max 15 words. Sir."}, {role:"user", content: text}]
                    })
                });
                const data = await res.json();
                const reply = data.choices.message.content;
                output.innerText = reply;
                speak(reply);
                status.innerText = "NEURAL LINK: STANDBY";
            } catch(e) { status.innerText = "BRAIN ERROR"; }
        }

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.voice = window.speechSynthesis.getVoices().find(v => v.lang.includes('en-GB')) || window.speechSynthesis.getVoices();
            window.speechSynthesis.speak(utter);
        }

        reactor.addEventListener('touchstart', (e) => { e.preventDefault(); startListening(); });
        reactor.addEventListener('touchend', () => { if(mediaRecorder) mediaRecorder.stop(); });
    </script>
</body>
</html>
