<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARTHUR LOCAL HUD</title>
    <style>
        :root { --gold: #ffd700; --bg: #000; }
        body { background: var(--bg); color: var(--gold); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; justify-content: space-between; padding: 60px 0; overflow: hidden; }
        #core { width: 140px; height: 140px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; text-shadow: 0 0 15px var(--gold); position: relative; }
        #display { width: 85%; text-align: center; border-top: 1px solid var(--gold); padding: 20px; min-height: 150px; display: flex; flex-direction: column; justify-content: center; background: rgba(255, 215, 0, 0.05); }
        #ptt-btn { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--gold); background: transparent; color: var(--gold); font-weight: bold; font-size: 1.1rem; }
        #ptt-btn:active { background: var(--gold); color: black; transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="core">A</div>

    <div id="display">
        <div id="status">LOCAL CORE ACTIVE</div>
        <div id="text">"Sir, please tap once to engage the local neural link."</div>
    </div>

    <button id="ptt-btn">HOLD</button>

    <script>
        const status = document.getElementById('status');
        const output = document.getElementById('text');
        const btn = document.getElementById('ptt-btn');

        // --- ARTHUR'S LOCAL LOGIC ---
        const brain = {
            "status": "Armor integrity is optimal. All systems are green, Sir.",
            "hello": "Greetings, Sir. I am ARTHUR. At your service.",
            "power": "Power cells are at maximum capacity. We are ready for engagement.",
            "who": "I am ARTHUR, your digital squire and tactical assistant.",
            "weapon": "Weapon systems are locked in safe mode, Sir. Shall I prime them?",
            "helmet": "The HUD is recalibrated and clear. Your vision is unimpeded.",
            "identify": "You are the Knight of the Cyber-Realm, Sir.",
            "thank": "The pleasure is entirely mine, Sir."
        };

        const recognition = new (window.webkitSpeechRecognition || window.recognition)();
        recognition.lang = 'en-US';

        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            recognition.start();
            status.innerText = "LISTENING...";
        });

        btn.addEventListener('touchend', () => {
            recognition.stop();
            status.innerText = "THINKING...";
        });

        recognition.onresult = (event) => {
            const transcript = event.results.transcript.toLowerCase();
            output.innerText = `"${transcript}"`;
            
            let response = "I'm afraid I don't have a protocol for that, Sir. But I am standing by.";
            
            // Search for keywords in your speech
            for (let key in brain) {
                if (transcript.includes(key)) {
                    response = brain[key];
                    break;
                }
            }

            setTimeout(() => {
                output.innerText = response;
                speak(response);
                status.innerText = "ARTHUR STANDBY";
            }, 400);
        };

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.voice = window.speechSynthesis.getVoices().find(v => v.lang.includes('en-GB')) || window.speechSynthesis.getVoices();
            utter.pitch = 0.95;
            window.speechSynthesis.speak(utter);
        }

        document.body.addEventListener('click', () => {
            window.speechSynthesis.getVoices();
            output.innerText = "Local link established, Sir. Hold to speak.";
        }, {once: true});
    </script>
</body>
</html>
