<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTHUR v11.6</title>
    <style>
        :root { --glow: #00f2ff; --bg: #050000; }
        body { 
            background: var(--bg); color: var(--glow); 
            font-family: sans-serif; display: flex; 
            flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; margin: 0; 
        }
        #arc-reactor { 
            width: 200px; height: 200px; 
            border: 5px solid var(--glow); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 5rem; cursor: pointer;
            box-shadow: 0 0 20px var(--glow);
            background: none; color: var(--glow);
            outline: none; -webkit-tap-highlight-color: rgba(0,0,0,0);
        }
        #display-panel { width: 90%; text-align: center; margin-top: 30px; }
        #status { font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 10px; }
        #output { font-size: 1.1rem; color: #fff; }
    </style>
</head>
<body>

    <button id="arc-reactor">A</button>

    <div id="display-panel">
        <div id="status">V11.6 UNRESTRICTED</div>
        <div id="output">"Standard input protocols engaged."</div>
    </div>

    <script>
        const GK_1 = "gsk_";
        const GK_2 = "zWqULWs5POPr7KPFqUp5WGdyb3FYF5mORx3bOk6Lz9l3LFOfsdta";
        const OK_1 = "sk-proj-";
        const OK_2 = "1iJ4z-Ut_aTNd3oP3FUjb_23Tc6ngugMShPm9ppNrM7b1Ng7IuwPAltinvmPry0exPvhY-eEr1T3BlbkFJ7-06AAOmNaQE14RhUBD4-5PVNI-7gM3U75dBjzy31tovHzWzCm-kny2LbuIhmK24M9SZh90BsA";

        const F_GK = GK_1 + GK_2;
        const F_OK = OK_1 + OK_2;

        const status = document.getElementById('status'), output = document.getElementById('output'), reactor = document.getElementById('arc-reactor');
        let mediaRecorder, chunks = [];

        async function processVoice(blob) {
            status.innerText = "THINKING...";
            const fd = new FormData();
            fd.append("file", blob, "audio.m4a");
            fd.append("model", "whisper-1");

            try {
                const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
                    method: "POST", headers: { "Authorization": `Bearer ${F_OK}` }, body: fd
                });
                const data = await res.json();
                if (!data?.text) throw new Error("No speech found.");
                output.innerText = `"${data.text}"`;

                const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${F_GK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role:"system", content:"You are ARTHUR. Dry wit. Max 10 words. Sir."}, {role:"user", content: data.text}]
                    })
                });

                const groqData = await groqRes.json();
                const reply = groqData?.choices?.?.message?.content;

                if (reply) {
                    output.innerText = reply;
                    speak(reply);
                    status.innerText = "READY";
                } else {
                    throw new Error(groqData?.error?.message || "Brain mismatch.");
                }
            } catch(e) { 
                status.innerText = "ALERT"; 
                output.innerText = "Diagnostic: " + e.message; 
            }
        }

        async function startListening() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(s);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => processVoice(new Blob(chunks, { type: 'audio/mp4' }));
                mediaRecorder.start();
                status.innerText = "LISTENING...";
                reactor.style.background = "rgba(0, 242, 255, 0.2)";
            } catch(e) { status.innerText = "MIC_ERR"; }
        }

        function stopListening() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                reactor.style.background = "none";
            }
        }

        function speak(t) { 
            window.speechSynthesis.cancel(); 
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); 
        }

        // BARE METAL HANDLERS
        reactor.onmousedown = startListening;
        reactor.onmouseup = stopListening;
        reactor.ontouchstart = (e) => { e.preventDefault(); startListening(); };
        reactor.ontouchend = (e) => { e.preventDefault(); stopListening(); };

        // Wake up audio
        document.onclick = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
