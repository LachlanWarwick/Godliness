<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ALFRED GAUNTLET OS</title>
    <style>
        :root { --glow: #00f2ff; --dim-glow: rgba(0, 242, 255, 0.3); --bg: #000b14; --panel: rgba(0, 20, 30, 0.8); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; }
        
        body { 
            background: var(--bg); margin: 0; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; width: 100vw; font-family: 'Courier New', monospace; 
            color: var(--glow);
        }

        /* Tactical Container */
        #suit-container { 
            width: 100%; height: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-around; padding: 60px 20px;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            background-image: radial-gradient(var(--dim-glow) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Right-Arm Specific Rotation */
        .rot-right { transform: rotate(90deg); width: 100vh !important; height: 100vw !important; }

        #init-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        #init-btn { border: 1px solid var(--glow); padding: 25px 50px; color: var(--glow); background: transparent; text-transform: uppercase; letter-spacing: 6px; cursor: pointer; box-shadow: 0 0 20px var(--dim-glow); }

        /* Arc Reactor HUD */
        #arc-reactor { 
            width: 180px; height: 180px; border: 2px solid var(--glow); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 3.5rem; 
            text-shadow: 0 0 15px var(--glow); box-shadow: 0 0 40px var(--dim-glow), inset 0 0 20px var(--dim-glow);
            cursor: pointer; position: relative; z-index: 5; background: var(--bg);
        }
        
        .active { animation: pulse 1s infinite alternate; }
        
        .ring { position: absolute; width: 130%; height: 130%; border: 1px dashed var(--glow); border-radius: 50%; opacity: 0.4; animation: spin 8s linear infinite; }
        .ring-inner { position: absolute; width: 115%; height: 115%; border: 1px solid var(--glow); border-radius: 50%; border-left-color: transparent; border-right-color: transparent; animation: spin 3s linear infinite reverse; }

        /* Output Panel */
        #display-panel { 
            width: 100%; max-width: 400px; background: var(--panel); 
            padding: 20px; border: 1px solid var(--dim-glow); 
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }
        #status { font-size: 0.7rem; letter-spacing: 4px; color: #008c96; margin-bottom: 8px; text-align: left; padding-left: 30px; }
        #output { font-size: 1rem; color: #fff; min-height: 50px; padding: 0 30px; }

        #flip-btn { 
            position: fixed; top: 20px; left: 20px; background: none; 
            border: 1px solid var(--dim-glow); color: var(--glow); 
            padding: 10px; font-size: 0.6rem; z-index: 101; letter-spacing: 2px;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { from { box-shadow: 0 0 20px var(--dim-glow); } to { box-shadow: 0 0 50px var(--glow); } }
    </style>
</head>
<body>

    <div id="init-screen">
        <button id="init-btn">Initialize Suit</button>
    </div>

    <button id="flip-btn" onclick="rotateUI()">TOGGLE AXIS</button>

    <div id="suit-container">
        <div id="arc-reactor">
            <div class="ring"></div>
            <div class="ring-inner"></div>
            A
        </div>

        <div id="display-panel">
            <div id="status">SYS_STATUS: READY</div>
            <div id="output">"Awaiting neural link, Sir."</div>
        </div>
    </div>

    <script>
        const GK_A = "gsk_", GK_B = "zWqULWs5POPr7KPFqUp5WGdyb3FYF5mORx3bOk6Lz9l3LFOfsdta";
        const OK_A = "sk-proj-", OK_B = "1iJ4z-Ut_aTNd3oP3FUjb_23Tc6ngugMShPm9ppNrM7b1Ng7IuwPAltinvmPry0exPvhY-eEr1T3BlbkFJ7-06AAOmNaQE14RhUBD4-5PVNI-7gM3U75dBjzy31tovHzWzCm-kny2LbuIhmK24M9SZh90BsA";
        const F_GK = GK_A + GK_B, F_OK = OK_A + OK_B;
        
        const status = document.getElementById('status'), output = document.getElementById('output'), reactor = document.getElementById('arc-reactor'), container = document.getElementById('suit-container');
        let mediaRecorder, chunks = [], isRight = false;

        function rotateUI() {
            isRight = !isRight;
            container.className = isRight ? 'rot-right' : '';
            if (navigator.vibrate) navigator.vibrate(isRight ? : 40);
        }

        document.getElementById('init-btn').addEventListener('click', async () => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            ctx.resume();
            try {
                await navigator.mediaDevices.getUserMedia({ audio: true });
                speak("Gauntlet online. Welcome back, Sir.");
                document.getElementById('init-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('init-screen').style.display = 'none', 800);
            } catch (e) { alert("Mic required for Suit OS."); }
        });

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            msg.voice = voices.find(v => v.lang.includes('GB')) || voices[0];
            msg.onstart = () => reactor.classList.add('active');
            msg.onend = () => reactor.classList.remove('active');
            window.speechSynthesis.speak(msg);
        }

        async function processVoice(blob) {
            status.innerText = "SYS_STATUS: ANALYZING";
            const fd = new FormData();
            fd.append("file", blob, "audio.m4a");
            fd.append("model", "whisper-1");

            try {
                const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
                    method: "POST", headers: { "Authorization": `Bearer ${F_OK}` }, body: fd
                });
                const data = await res.json();
                const cmd = data.text.toLowerCase().trim();
                
                if (cmd.includes("open") || cmd.includes("run") || cmd.includes("shortcut")) {
                    let sc = cmd.replace("open","").replace("run","").replace("shortcut","").trim();
                    speak(`Executing ${sc}.`);
                    window.location.href = `shortcuts://run-shortcut?name=${encodeURIComponent(sc)}`;
                    return;
                }

                const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${F_GK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "system", content: "You are ALFRED, a suit AI. Max 15 words. Concise and loyal. Address user as Sir."}, {role: "user", content: data.text}]
                    })
                });
                const groqData = await groqRes.json();
                const reply = groqData.choices[0].message.content;
                output.innerText = reply;
                speak(reply);
                status.innerText = "SYS_STATUS: ACTIVE";
            } catch(e) { status.innerText = "SYS_STATUS: ERROR"; }
        }

        async function startListening() {
            try {
                if (navigator.vibrate) navigator.vibrate(30);
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(s);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => processVoice(new Blob(chunks, { type: 'audio/mp4' }));
                mediaRecorder.start();
                status.innerText = "SYS_STATUS: LISTENING";
            } catch(e) { status.innerText = "SYS_STATUS: MIC_FAIL"; }
        }

        reactor.addEventListener('touchstart', (e) => { e.preventDefault(); startListening(); });
        reactor.addEventListener('touchend', (e) => { e.preventDefault(); if(mediaRecorder?.state === "recording") mediaRecorder.stop(); });
    </script>
</body>
</html>
