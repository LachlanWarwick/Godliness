<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTHUR v12.8</title>
    <style>
        body { background: #000b14; color: #00f2ff; font-family: sans-serif; text-align: center; padding-top: 50px; margin: 0; overflow: hidden; }
        
        #arc-reactor { 
            width: 180px; height: 180px; 
            border: 5px solid #00f2ff; border-radius: 50%; 
            background: none; color: #00f2ff; font-size: 4rem;
            cursor: pointer; 
            display: inline-block;
            position: relative; 
            z-index: 999;       
            transition: all 0.2s;
            
            /* CRITICAL: Stops the "A" from being selected/highlighted */
            -webkit-user-select: none; 
            user-select: none;
            -webkit-touch-callout: none; /* Stops the "Copy/Paste" menu */
            -webkit-tap-highlight-color: transparent;
        }

        #arc-reactor:active { transform: scale(0.92); }
        .recording { background: rgba(0, 242, 255, 0.3) !important; box-shadow: 0 0 30px #00f2ff; }
        #output { margin-top: 30px; color: white; padding: 20px; font-style: italic; min-height: 80px; }
        #status { margin-top: 15px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body oncontextmenu="return false;">

    <button id="arc-reactor">A</button>
    <div id="status">Tap to Start</div>
    <div id="output">"No-selection protocols active. Sir."</div>

    <script>
        // --- SECURE KEYS ---
        const GK_1 = "gsk_";
        const GK_2 = "zWqULWs5POPr7KPFqUp5WGdyb3FYF5mORx3bOk6Lz9l3LFOfsdta";
        const OK_1 = "sk-proj-";
        const OK_2 = "1iJ4z-Ut_aTNd3oP3FUjb_23Tc6ngugMShPm9ppNrM7b1Ng7IuwPAltinvmPry0exPvhY-eEr1T3BlbkFJ7-06AAOmNaQE14RhUBD4-5PVNI-7gM3U75dBjzy31tovHzWzCm-kny2LbuIhmK24M9SZh90BsA";

        const btn = document.getElementById('arc-reactor');
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        let mediaRecorder, chunks = [];

        async function toggleMic() {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    chunks = [];
                    mediaRecorder.ondataavailable = e => chunks.push(e.data);
                    mediaRecorder.onstop = sendToArthur;
                    mediaRecorder.start();
                    
                    btn.classList.add('recording');
                    status.innerText = "RECORDING...";
                } catch (e) { 
                    status.innerText = "MIC ERROR";
                    output.innerText = "Microphone access denied.";
                }
            } else {
                mediaRecorder.stop();
                btn.classList.remove('recording');
                status.innerText = "THINKING...";
            }
        }

        async function sendToArthur() {
            const blob = new Blob(chunks, { type: 'audio/webm' }); 
            const fd = new FormData();
            fd.append("file", blob, "rec.webm");
            fd.append("model", "whisper-1");

            try {
                const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
                    method: "POST", 
                    headers: { "Authorization": `Bearer ${OK_1 + OK_2}` }, 
                    body: fd
                });
                const data = await res.json();
                if (!data?.text) throw new Error("Whisper failed.");

                output.innerText = `"${data.text}"`;

                const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GK_1 + GK_2}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{role:"system", content:"You are ARTHUR. Witty. Max 10 words. Sir."}, {role:"user", content: data.text}]
                    })
                });
                
                const groqData = await groqRes.json();
                const reply = groqData?.choices?.?.message?.content || "No response.";
                
                output.innerText = reply;
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(reply));
                status.innerText = "TAP TO START";
            } catch (e) { 
                output.innerText = "Error: " + e.message; 
                status.innerText = "TAP TO START";
            }
        }

        btn.onclick = toggleMic;
        // Wake up audio engine
        document.addEventListener('touchstart', () => { window.speechSynthesis.getVoices(); }, {once: true});
    </script>
</body>
</html>
