<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARTHUR FORCE-SYNC</title>
    <style>
        :root { --gold: #ffd700; --bg: #000; }
        body { background: var(--bg); color: var(--gold); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; justify-content: space-around; overflow: hidden; }
        #core { width: 130px; height: 130px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; text-shadow: 0 0 10px var(--gold); }
        #display { width: 85%; text-align: center; border-top: 1px solid var(--gold); padding: 20px; min-height: 140px; background: rgba(255, 215, 0, 0.05); }
        #ptt-btn { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--gold); background: transparent; color: var(--gold); font-weight: bold; }
        #ptt-btn:active { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <div id="core">A</div>

    <div id="display">
        <div id="status">SECURE_LINK</div>
        <div id="text">"Tap to initialize, Sir."</div>
    </div>

    <button id="ptt-btn">HOLD</button>

    <script>
        const status = document.getElementById('status');
        const output = document.getElementById('text');
        const btn = document.getElementById('ptt-btn');

        const brain = {
            "status": "Armor integrity is optimal. All systems are green, Sir.",
            "hello": "Greetings, Sir. I am ARTHUR.",
            "power": "Power cells are at maximum capacity.",
            "who": "I am ARTHUR, your digital squire.",
            "identify": "You are the Cyber-Knight, Sir."
        };

        const recognition = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        let watchdog;

        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            window.speechSynthesis.cancel();
            try {
                recognition.start();
                status.innerText = "LISTENING...";
            } catch(err) {}
        });

        btn.addEventListener('touchend', (e) => {
            e.preventDefault();
            recognition.stop();
            status.innerText = "PROCESSING...";

            // FORCE RESET: If no result in 3 seconds, kill it and reset
            watchdog = setTimeout(() => {
                if (status.innerText === "PROCESSING...") {
                    status.innerText = "RE-SYNCING";
                    output.innerText = "Connection weak. Please try again, Sir.";
                    recognition.abort(); // Force-kill the listener
                }
            }, 3000);
        });

        recognition.onresult = (event) => {
            clearTimeout(watchdog); // Stop the watchdog
            const transcript = event.results.transcript.toLowerCase();
            output.innerText = `"${transcript}"`;
            
            let response = "I don't have a protocol for that, Sir.";
            for (let key in brain) {
                if (transcript.includes(key)) {
                    response = brain[key];
                    break;
                }
            }

            output.innerText = response;
            speak(response);
            status.innerText = "STANDBY";
        };

        recognition.onerror = (e) => {
            clearTimeout(watchdog);
            status.innerText = "LINK ERROR";
            output.innerText = "Sir, voice link failed. Error: " + e.error;
        };

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utter.voice = voices.find(v => v.lang.includes('en-GB')) || voices;
            utter.pitch = 0.95;
            window.speechSynthesis.speak(utter);
        }

        document.body.addEventListener('click', () => {
            window.speechSynthesis.getVoices();
            status.innerText = "ONLINE";
            output.innerText = "Ready, Sir. Hold the button and speak.";
        }, {once: true});
    </script>
</body>
</html>
