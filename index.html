<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GODLINESS Ascension</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style id="theme-style">
        :root { 
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #fbbf24; 
            --secondary: #22c55e; --accent: #3b82f6; --danger: #ef4444; --font-main: sans-serif;
            --anim-speed: 0.3s;
        }
        .light-mode { --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --primary: #d97706; --accent: #2563eb; }
        .midnight-mode { --bg: #000000; --card: #111111; --text: #ffffff; --primary: #ffd700; --accent: #ffffff; }
        
        body { 
            background: var(--bg); color: var(--text); font-family: var(--font-main); 
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; 
            transition: background var(--anim-speed), color var(--anim-speed); min-height: 100vh;
        }

        /* Essential Visibility Fix */
        .hidden { display: none !important; }

        .container { width: 100%; max-width: 400px; padding-bottom: 50px; position: relative; }
        
        /* Animations */
        @keyframes xpFloat {
            0% { opacity: 0; transform: translateY(0); }
            20% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-50px); }
        }
        .xp-popup {
            position: absolute; color: var(--primary); font-weight: 900;
            font-size: 1.2rem; pointer-events: none; z-index: 1000;
            animation: xpFloat 1s ease-out forwards;
        }

        .stats-card, .box, .task-item { 
            background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 15px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; 
            border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s;
            position: relative;
        }

        /* Progress Bar */
        .progress-container { background: rgba(255,255,255,0.1); height: 14px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #progress-bar { background: linear-gradient(90deg, var(--primary), #fcd34d); height: 100%; width: 0%; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* Task Items */
        .task-item { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .task-item.done { border-color: var(--secondary); background: rgba(34, 197, 94, 0.15); }
        .streak-fire { color: #f97316; font-weight: bold; font-size: 1rem; }

        /* Leaderboard & Friends */
        .lb-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .xp-pill { background: rgba(251, 191, 36, 0.15); color: var(--primary); padding: 2px 8px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; }
        .date-header { cursor: pointer; background: rgba(128,128,128,0.1); padding: 12px; margin-top: 8px; border-radius: 12px; font-weight: bold; }

        /* Buttons */
        button { background: var(--primary); border: none; padding: 14px; border-radius: 50px; font-weight: 800; color: #000; cursor: pointer; width: 100%; margin: 8px 0; }
        .midnight-mode .leave-btn { color: #fff !important; background: var(--danger) !important; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-content { background: var(--card); padding: 25px; border-radius: 30px; width: 90%; max-width: 380px; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        
        <div id="auth-screen">
            <h1 style="text-align:center; color:var(--primary); font-size: 2.5rem; margin-top: 40px;">GODLINESS</h1>
            <div class="box">
                <input type="email" id="email" placeholder="Email" style="width:100%; padding:12px; margin:8px 0; border-radius:10px; border:none; background:#0f172a; color:#fff;">
                <input type="password" id="pass" placeholder="Password" style="width:100%; padding:12px; margin:8px 0; border-radius:10px; border:none; background:#0f172a; color:#fff;">
                <button onclick="handleAuth('login')">Login</button>
                <button style="background:transparent; color:var(--primary); border:2px solid var(--primary);" onclick="handleAuth('signup')">Sign Up</button>
            </div>
        </div>

        <div id="squad-screen" class="hidden">
            <h2 style="text-align:center;">Join your Squad</h2>
            <div class="box">
                <input type="text" id="squad-input" placeholder="Enter Squad Code" style="width:100%; padding:12px; margin:8px 0; border-radius:10px;">
                <button onclick="joinSquad()">Join Squad</button>
                <button style="background:var(--accent); color:white;" onclick="createSquad()">Create New Squad</button>
            </div>
        </div>

        <div id="app-screen" class="hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div id="display-name" style="font-weight:900; font-size:1.4rem;">Warrior</div>
                <div style="display:flex; gap:12px;">
                    <button onclick="document.getElementById('achieveModal').style.display='flex'" style="width:auto; padding: 10px 18px;">🏆</button>
                    <button onclick="document.getElementById('settingsModal').style.display='flex'" style="width:auto; background:none; color:inherit; font-size:1.8rem; padding:0;">⚙️</button>
                </div>
            </div>

            <div class="stats-card">
                <h2 id="user-rank" style="text-align:center; margin:0;">Level 1</h2>
                <div class="progress-container"><div id="progress-bar"></div></div>
                <div style="text-align:center; font-weight:bold; opacity:0.8;">XP: <span id="xp-display">0</span> / 700</div>
            </div>

            <div id="task-container"></div>

            <div class="box" style="text-align:center;">
                <h3>Sidequest Wheel</h3>
                <div class="wheel-outer"><div class="pointer"></div><div id="wheel"></div></div>
                <div id="quest-display"></div>
                <button id="spin-btn" onclick="spinWheel()">SPIN FOR XP</button>
            </div>

            <div class="box">
                <h3 style="text-align:center;">Leaderboard</h3>
                <div id="leaderboard-list"></div>
            </div>

            <div class="box">
                <h3 style="text-align:center;">Squad Activity</h3>
                <div id="friends-list"></div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal" onclick="this.style.display='none'"><div class="modal-content" onclick="event.stopPropagation()">
        <h2>Warrior Settings</h2>
        <label>Name</label><input type="text" id="set-name" style="width:100%; padding:10px; margin-bottom:15px;">
        <label>Theme</label><select id="theme-select" style="width:100%; padding:10px; margin-bottom:15px;"><option value="dark">Dark</option><option value="light">Light</option><option value="midnight">Midnight</option></select>
        <button onclick="updateProfile()">Save</button>
        <button class="leave-btn" onclick="leaveSquad()">Leave Squad</button>
        <button style="background:#475569; color:white;" onclick="auth.signOut()">Logout</button>
        <button onclick="document.getElementById('settingsModal').style.display='none'" style="background:none; color:var(--text);">Close</button>
    </div></div>

    <div id="achieveModal" class="modal" onclick="this.style.display='none'"><div class="modal-content" onclick="event.stopPropagation()"><h2>Trophy Room</h2><div id="achievements-full-list"></div><button onclick="document.getElementById('achieveModal').style.display='none'">Close</button></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAwJEP9IzCqyaNKQBjJohPEmykTpSBL5l4",
            authDomain: "godliness-bd3f8.firebaseapp.com",
            projectId: "godliness-bd3f8",
            storageBucket: "godliness-bd3f8.firebasestorage.app",
            messagingSenderId: "520495643556",
            appId: "1:520495643556:web:e107bee032556f9ed89f31",
            databaseURL: "https://godliness-bd3f8-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        const taskDefs = [
            {l:'G', t:'Gratitude', s:'Name 3 blessings'}, {l:'O', t:'Outreach', s:'Kindness/service'},
            {l:'D', t:'Discipline', s:'Workout/hard task'}, {l:'L', t:'Listen', s:'Quiet time/prayer'},
            {l:'I', t:'Imagine', s:'Creative work'}, {l:'N', t:'New Ground', s:'Learn a fact'},
            {l:'E', t:'Examine', s:'Scripture/study'}, {l:'S', t:'Sidequest', s:'Spin the wheel'},
            {l:'S', t:'Self-Reflect', s:'Nightly recap'}
        ];

        let userState = null;
        let sidequests = ["Solo: Walk 1 mile", "Squad: Group Workout", "Solo: No Sugar Today"];

        auth.onAuthStateChanged(user => {
            if(user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    userState = snap.val();
                    if(userState) {
                        applyVisuals(userState.theme);
                        if(!userState.squadId) {
                            document.getElementById('auth-screen').classList.add('hidden');
                            document.getElementById('app-screen').classList.add('hidden');
                            document.getElementById('squad-screen').classList.remove('hidden');
                        } else {
                            document.getElementById('auth-screen').classList.add('hidden');
                            document.getElementById('squad-screen').classList.add('hidden');
                            document.getElementById('app-screen').classList.remove('hidden');
                            showApp();
                        }
                    }
                });
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('squad-screen').classList.add('hidden');
            }
        });

        function showApp() {
            document.getElementById('display-name').innerText = userState.name;
            document.getElementById('xp-display').innerText = userState.xp;
            document.getElementById('user-rank').innerText = `Level ${userState.lvl}`;
            document.getElementById('progress-bar').style.width = (userState.xp / 7) + '%';
            
            // Render Tasks
            const today = new Date().toLocaleDateString();
            const doneToday = userState.history ? userState.history.filter(h => h.d === today).map(h => h.t) : [];
            document.getElementById('task-container').innerHTML = taskDefs.map(item => `
                <div class="task-item ${doneToday.includes(item.t) ? 'done' : ''}" onclick="logTask('${item.t}', event)">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <div style="font-size:1.6rem; font-weight:900; color:var(--primary);">${item.l}</div>
                        <div><b>${item.t}</b><br><small style="opacity:0.7;">${item.s}</small></div>
                    </div>
                    <div class="streak-fire">🔥 ${userState.streaks?.[item.t] || 0}</div>
                </div>`).join('');

            // Leaderboard
            db.ref('users').orderByChild('squadId').equalTo(userState.squadId).on('value', snap => {
                const members = Object.values(snap.val() || {});
                const lb = document.getElementById('leaderboard-list');
                lb.innerHTML = members.sort((a,b) => b.lvl - a.lvl || b.xp - a.xp).map((m, i) => `
                    <div class="lb-row">
                        <span>#${i+1} <b>${m.name}</b></span>
                        <div><span style="opacity:0.6;">Lvl ${m.lvl}</span> <span class="xp-pill">${m.xp} XP</span></div>
                    </div>`).join('');
            });
        }

        async function logTask(t, event) {
            const today = new Date().toLocaleDateString();
            if(userState.history && userState.history.some(h => h.t === t && h.d === today)) return;
            
            const n = prompt(`What did you do for ${t}?`);
            if(!n) return;

            // XP Animation
            const rect = event.currentTarget.getBoundingClientRect();
            showXPPopup(rect.left + rect.width/2, rect.top);

            let { xp, lvl, history, streaks } = userState;
            xp += 15;
            if(xp >= 700) { xp = 0; lvl++; confetti(); }
            if(!streaks) streaks = {};
            streaks[t] = (streaks[t] || 0) + 1;
            if(!history) history = [];
            history.unshift({ t, n, d: today });
            
            await db.ref('users/' + auth.currentUser.uid).update({ xp, lvl, history, streaks });
        }

        function showXPPopup(x, y) {
            const popup = document.createElement('div');
            popup.className = 'xp-popup';
            popup.innerText = '+15 XP';
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        function applyVisuals(theme) {
            document.body.className = theme === 'light' ? 'light-mode' : (theme === 'midnight' ? 'midnight-mode' : '');
        }

        async function handleAuth(type) {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(type === 'signup') {
                const res = await auth.createUserWithEmailAndPassword(e, p);
                await db.ref('users/' + res.user.uid).set({ name: "Warrior", xp: 0, lvl: 1, history: [], streaks: {}, squadId: "", theme: "dark" });
            } else { await auth.signInWithEmailAndPassword(e, p); }
        }

        async function createSquad() { const code = Math.random().toString(36).substring(2, 8).toUpperCase(); await db.ref('users/' + auth.currentUser.uid).update({ squadId: code }); }
        async function joinSquad() { const code = document.getElementById('squad-input').value.toUpperCase(); await db.ref('users/' + auth.currentUser.uid).update({ squadId: code }); }
        async function leaveSquad() { if(confirm("Leave squad?")) await db.ref('users/' + auth.currentUser.uid).update({ squadId: "" }); }
        async function updateProfile() { await db.ref('users/' + auth.currentUser.uid).update({ name: document.getElementById('set-name').value, theme: document.getElementById('theme-select').value }); }
    </script>
</body>
</html>
