<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARTHUR v11.9</title>
    <style>
        :root { --glow: #00f2ff; --bg: #000b14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--glow); font-family: sans-serif; text-align: center; margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s; }
        #begin-btn { background: var(--glow); color: #000; padding: 25px 40px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; letter-spacing: 2px; }

        #arc-reactor { 
            width: 140px; height: 140px; border: 3px solid var(--glow); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 3rem; text-shadow: 0 0 10px var(--glow); 
            box-shadow: inset 0 0 20px var(--glow), 0 0 15px var(--glow); 
            margin-bottom: 30px; cursor: pointer; transition: transform 0.1s;
        }

        #status { font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 10px; height: 20px; font-weight: bold; }
        #output { width: 85%; font-size: 1rem; color: #fff; font-style: italic; min-height: 60px; word-wrap: break-word; }
    </style>
</head>
<body>

    <div id="splash">
        <button id="begin-btn">INITIALIZE ARTHUR</button>
    </div>

    <div id="status">OFFLINE</div>
    <div id="arc-reactor">A</div>
    <div id="output">"Standing by, Sir."</div>

    <script>
        // --- SPLIT KEY AUTHENTICATION ---
        const G_P1 = "gsk_";
        const G_P2 = "zWqULWs5POPr7KPFqUp5WGdyb3FYF5mORx3bOk6Lz9l3LFOfsdta";
        
        const O_P1 = "sk-proj-";
        const O_P2 = "1iJ4z-Ut_aTNd3oP3FUjb_23Tc6ngugMShPm9ppNrM7b1Ng7IuwPAltinvmPry0exPvhY-eEr1T3BlbkFJ7-06AAOmNaQE14RhUBD4-5PVNI-7gM3U75dBjzy31tovHzWzCm-kny2LbuIhmK24M9SZh90BsA";

        const KEY_G = G_P1 + G_P2;
        const KEY_O = O_P1 + O_P2;

        let recorder, stream, chunks = [];

        // INITIALIZE SYSTEM
        document.getElementById('begin-btn').onclick = async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('status').innerText = "READY";
                    speak("Systems online, Sir.");
                }, 400);
                window.speechSynthesis.getVoices();
            } catch (e) { 
                alert("Microphone link failed. Check permissions, Sir."); 
            }
        };

        async function process(blob) {
            const statusDiv = document.getElementById('status');
            const outputDiv = document.getElementById('output');
            
            if (blob.size < 2000) { // Ignore accidental taps
                statusDiv.innerText = "READY";
                return;
            }

            statusDiv.innerText = "LINKING...";
            
            try {
                const fd = new FormData();
                fd.append("file", blob, "audio.m4a");
                fd.append("model", "whisper-1");

                // EAR (OpenAI)
                const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
                    method: "POST", headers: {"Authorization": `Bearer ${KEY_O}`}, body: fd
                });
                const data = await res.json();
                if (data.error) throw new Error("OpenAI: " + data.error.message);

                outputDiv.innerText = `"${data.text}"`;
                statusDiv.innerText = "THINKING...";

                // BRAIN (Groq)
                const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {"Authorization": `Bearer ${KEY_G}`, "Content-Type": "application/json"},
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {role: "system", content: "You are ARTHUR. Dry British wit. 10 words max. Sir."},
                            {role: "user", content: data.text}
                        ]
                    })
                });

                const groqData = await groqRes.json();
                const reply = groqData?.choices?.?.message?.content || "Diagnostic failed.";

                outputDiv.innerText = reply;
                speak(reply);
            } catch (e) {
                outputDiv.innerText = "Error: " + e.message;
            } finally {
                statusDiv.innerText = "READY";
            }
        }

        function speak(t) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t);
            const voices = window.speechSynthesis.getVoices();
            u.voice = voices.find(v => v.lang.includes('en-GB')) || voices;
            window.speechSynthesis.speak(u);
        }

        const reactor = document.getElementById('arc-reactor');

        const startRec = (e) => {
            if (e.cancelable) e.preventDefault();
            if (recorder && recorder.state !== 'inactive') return;

            document.getElementById('status').innerText = "LISTENING";
            reactor.style.transform = "scale(0.9)";
            chunks = [];
            
            try {
                recorder = new MediaRecorder(stream);
                recorder.ondataavailable = (ev) => chunks.push(ev.data);
                recorder.onstop = () => process(new Blob(chunks, {type: 'audio/mp4'}));
                recorder.start();
            } catch (err) {
                document.getElementById('status').innerText = "READY";
            }
        };

        const stopRec = (e) => {
            if (e.cancelable) e.preventDefault();
            reactor.style.transform = "scale(1)";
            if (recorder && recorder.state === "recording") {
                recorder.stop();
            }
        };

        // Event Listeners
        reactor.addEventListener('touchstart', startRec);
        reactor.addEventListener('touchend', stopRec);
        reactor.addEventListener('mousedown', startRec);
        reactor.addEventListener('mouseup', stopRec);

    </script>
</body>
</html>
