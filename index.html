<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Godliness MVP</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #fbbf24; --secondary: #22c55e; --accent: #3b82f6; --danger: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 100%; max-width: 400px; padding-bottom: 80px; }
        .box, .task-item { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: var(--primary); border: none; padding: 14px; border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer; color: #000; margin-top: 10px; }
        .hidden { display: none !important; }
        
        /* Task List */
        .task-item { display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .task-item.done { border-color: var(--secondary); background: rgba(34, 197, 94, 0.1); opacity: 0.8; }
        .letter { font-size: 1.5rem; font-weight: 900; color: var(--primary); min-width: 30px; text-align: center; }

        /* Wheel */
        .wheel-outer { position: relative; width: 200px; height: 200px; margin: 15px auto; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--accent); position: relative; overflow: hidden; transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1); }
        .segment { position: absolute; width: 50%; height: 50%; top: 0; left: 50%; transform-origin: 0% 100%; }
        .pointer { width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 20px solid var(--danger); position: absolute; top: -10px; left: 50%; transform: translateX(-50%); z-index: 10; }

        /* Tabs & Lists */
        .lb-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #334155; }
        .date-header { background: rgba(255,255,255,0.1); padding: 10px; margin-top: 8px; border-radius: 10px; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
        .history-content { padding: 10px; font-size: 0.85rem; border-left: 2px solid var(--accent); margin-left: 10px; }
        
        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); padding: 20px; border-radius: 25px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .achieve-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid #444; }
        .achieve-item.unlocked { border-left-color: var(--primary); background: rgba(251, 191, 36, 0.1); }
    </style>
</head>
<body>
    <div class="container">
        
        <div id="auth-screen">
            <h1 style="color:var(--primary); text-align:center; font-size:2.5rem;">GODLINESS</h1>
            <div class="box">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Password">
                <button onclick="handleAuth('login')">Login</button>
                <button style="background:transparent; color:var(--primary); border:1px solid var(--primary);" onclick="handleAuth('signup')">Sign Up</button>
            </div>
        </div>

        <div id="squad-screen" class="hidden">
            <h2 style="text-align:center;">Warrior Profile</h2>
            <div class="box">
                <input type="text" id="squad-input" placeholder="Enter 6-Digit Squad Code">
                <button onclick="joinSquad()">Join Squad</button>
                <div style="text-align:center; margin:15px 0; opacity:0.5;">— OR —</div>
                <button style="background:var(--accent); color:white;" onclick="createSquad()">Create New Squad</button>
            </div>
        </div>

        <div id="app-screen" class="hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <div><small style="opacity:0.6;">SQUAD CODE</small><br><b id="squad-code-display" style="color:var(--primary);"></b></div>
                <button onclick="document.getElementById('achieveModal').style.display='flex'" style="width:auto; padding:8px 15px;">🏆 Trophies</button>
            </div>

            <div class="box" style="text-align:center;">
                <h1 id="lvl-display" style="font-size:3rem; margin:0; color:var(--primary);">1</h1>
                <div style="background:#334155; height:8px; border-radius:10px; margin:10px 0; overflow:hidden;">
                    <div id="xp-bar" style="background:var(--primary); height:100%; width:0%; transition:width 0.5s;"></div>
                </div>
                <small>XP: <span id="xp-val">0</span> / 700</small>
            </div>

            <div id="task-container"></div>

            <div class="box" style="text-align:center;">
                <h3>Sidequest Wheel</h3>
                <div class="wheel-outer"><div class="pointer"></div><div id="wheel"></div></div>
                <div id="quest-display" style="min-height:50px; margin:10px 0;">Spin for a challenge!</div>
                <button id="spin-btn" onclick="spinWheel()">SPIN WHEEL</button>
            </div>

            <div class="box">
                <h3 style="margin-top:0;">Leaderboard</h3>
                <div id="leaderboard"></div>
            </div>

            <div class="box">
                <h3 style="margin-top:0;">Squad Activity</h3>
                <div id="squad-history"></div>
            </div>

            <button style="background:transparent; color:var(--danger); font-size:0.8rem;" onclick="auth.signOut()">Logout Account</button>
        </div>
    </div>

    <div id="achieveModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2>Trophy Room</h2>
            <div id="achievements-list"></div>
            <button onclick="document.getElementById('achieveModal').style.display='none'">Close</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAwJEP9IzCqyaNKQBjJohPEmykTpSBL5l4",
            authDomain: "godliness-bd3f8.firebaseapp.com",
            projectId: "godliness-bd3f8",
            storageBucket: "godliness-bd3f8.firebasestorage.app",
            messagingSenderId: "520495643556",
            appId: "1:520495643556:web:e107bee032556f9ed89f31"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const taskDefs = [
            {l:'G', t:'Gratitude', s:'Name 3 blessings'}, {l:'O', t:'Outreach', s:'Kindness/service'},
            {l:'D', t:'Discipline', s:'Workout/Hard task'}, {l:'L', t:'Listen', s:'Quiet time/Prayer'},
            {l:'I', t:'Imagine', s:'Creative work'}, {l:'N', t:'New Ground', s:'Learn a fact'},
            {l:'E', t:'Examine', s:'Scripture/Study'}, {l:'S', t:'Sidequest', s:'Spin the Wheel'},
            {l:'S', t:'Self-Reflect', s:'Nightly recap'}
        ];

        const sidequests = [
            "Solo: Mystery Meal | Squad: Random Cook-off",
            "Solo: Trade paperclip | Squad: Trade up items 20m",
            "Solo: Weird $5 shirt | Squad: Style each other",
            "Solo: Hold pose 60s | Squad: Group FREEZE 2m",
            "Solo: Walk 1 mile | Squad: Secret Service Escort"
        ];

        let currentUser = null;
        let squadId = null;
        let userData = null;

        // AUTH
        async function handleAuth(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                if(type === 'signup') {
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    const name = prompt("Enter Display Name:");
                    await db.collection('users').doc(res.user.uid).set({ name: name || "Warrior", xp: 0, lvl: 1, squadId: null, history: [], lastActive: "" });
                } else {
                    await auth.signInWithEmailAndPassword(e, p);
                }
            } catch(err) { alert(err.message); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                initUser();
            } else {
                location.reload();
            }
        });

        async function initUser() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            userData = doc.data();
            if(userData.squadId) {
                squadId = userData.squadId;
                showApp();
            } else {
                document.getElementById('squad-screen').classList.remove('hidden');
            }
        }

        async function createSquad() {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            await db.collection('squads').doc(code).set({ created: Date.now() });
            await db.collection('users').doc(currentUser.uid).update({ squadId: code });
            location.reload();
        }

        async function joinSquad() {
            const code = document.getElementById('squad-input').value.toUpperCase();
            const s = await db.collection('squads').doc(code).get();
            if(s.exists()) {
                await db.collection('users').doc(currentUser.uid).update({ squadId: code });
                location.reload();
            } else { alert("Not found"); }
        }

        function showApp() {
            document.getElementById('squad-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('squad-code-display').innerText = squadId;
            setupWheel();

            // Real-time Sync
            db.collection('users').where('squadId', '==', squadId).onSnapshot(snap => {
                const lb = document.getElementById('leaderboard');
                const hist = document.getElementById('squad-history');
                lb.innerHTML = ''; hist.innerHTML = '';
                let members = [];

                snap.forEach(d => {
                    const m = d.data();
                    members.push(m);
                    if(d.id === currentUser.uid) {
                        userData = m;
                        renderMyStats();
                    }
                    // Add to Squad History
                    if(m.history && m.history.length > 0) {
                        hist.innerHTML += `<div class="date-header" onclick="this.nextElementSibling.classList.toggle('hidden')">👤 ${m.name}</div>
                        <div class="hidden history-content">${m.history.slice(0,5).map(h => `<div><b>${h.t}:</b> ${h.n}</div>`).join('')}</div>`;
                    }
                });

                members.sort((a,b) => b.lvl - a.lvl || b.xp - a.xp).forEach((m, i) => {
                    lb.innerHTML += `<div class="lb-row"><span>#${i+1} ${m.name}</span><b>LVL ${m.lvl}</b></div>`;
                });
                renderTrophies();
            });
        }

        function renderMyStats() {
            document.getElementById('lvl-display').innerText = userData.lvl;
            document.getElementById('xp-val').innerText = userData.xp;
            document.getElementById('xp-bar').style.width = (userData.xp / 700 * 100) + '%';
            
            const today = new Date().toLocaleDateString();
            const doneToday = userData.history.filter(h => h.d === today).map(h => h.t);
            
            document.getElementById('task-container').innerHTML = taskDefs.map(item => `
                <div class="task-item ${doneToday.includes(item.t) ? 'done' : ''}" onclick="logTask('${item.t}')">
                    <div class="letter">${item.l}</div>
                    <div><b>${item.t}</b><br><small style="opacity:0.7;">${item.s}</small></div>
                </div>`).join('');
        }

        async function logTask(t) {
            const today = new Date().toLocaleDateString();
            const doneToday = userData.history.filter(h => h.d === today).map(h => h.t);
            if(doneToday.includes(t)) return;

            const n = prompt(`Entry for ${t}:`);
            if(!n) return;

            let { xp, lvl, history } = userData;
            xp += 50;
            if(xp >= 700) { xp = 0; lvl++; confetti(); }
            history.unshift({ t, n, d: today });

            await db.collection('users').doc(currentUser.uid).update({ xp, lvl, history });
        }

        function setupWheel() {
            const wheel = document.getElementById('wheel');
            const arc = 360 / sidequests.length;
            wheel.innerHTML = '';
            sidequests.forEach((q, i) => {
                const seg = document.createElement('div');
                seg.className = 'segment';
                seg.style.background = i % 2 === 0 ? '#22c55e' : '#fbbf24';
                seg.style.transform = `rotate(${i * arc}deg) skewY(${arc - 90}deg)`;
                wheel.appendChild(seg);
            });
        }

        let curRot = 0;
        function spinWheel() {
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            const winIdx = Math.floor(Math.random() * sidequests.length);
            const arc = 360 / sidequests.length;
            curRot += 1440 + ((sidequests.length - winIdx) * arc - (arc / 2));
            document.getElementById('wheel').style.transform = `rotate(${curRot}deg)`;
            setTimeout(() => {
                document.getElementById('quest-display').innerText = sidequests[winIdx];
                btn.disabled = false;
                confetti();
            }, 3000);
        }

        function renderTrophies() {
            const trophies = [
                {n: "Awakened", d: "Logged first win", c: userData.history.length > 0},
                {n: "High Roller", d: "Reached Level 5", c: userData.lvl >= 5},
                {n: "Mischief", d: "Completed 5 Sidequests", c: userData.history.filter(h => h.t === 'Sidequest').length >= 5}
            ];
            document.getElementById('achievements-list').innerHTML = trophies.map(a => `
                <div class="achieve-item ${a.c ? 'unlocked' : ''}"><b>${a.c ? '✅' : '🔒'} ${a.n}</b><br><small>${a.d}</small></div>
            `).join('');
        }
    </script>
</body>
</html>
