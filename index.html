<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARTHUR v11.3</title>
    <style>
        :root { --glow: #00f2ff; --bg: #000b14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
        
        body { 
            background: var(--bg); 
            color: var(--glow); 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-around; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            padding: 40px 0; 
        }

        /* --- FIXED SPLASH SCREEN --- */
        #splash {
            position: fixed;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            background: var(--bg);
            z-index: 9999; /* Higher than everything else */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
            pointer-events: auto; /* Ensure the splash itself can be touched */
        }

        #begin-btn {
            padding: 20px 40px;
            background: rgba(0, 242, 255, 0.1);
            border: 2px solid var(--glow);
            color: var(--glow);
            font-size: 1.2rem;
            letter-spacing: 4px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,242,255,0.3);
            border-radius: 8px;
            pointer-events: auto; /* FORCE clickability */
            z-index: 10000;
            position: relative;
        }

        #begin-btn:active {
            background: var(--glow);
            color: var(--bg);
        }

        /* --- CORE UI --- */
        #arc-reactor { 
            width: 160px; height: 160px; 
            border: 2px solid var(--glow); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 3.5rem; text-shadow: 0 0 10px var(--glow); 
            box-shadow: inset 0 0 20px var(--glow), 0 0 15px var(--glow); 
            cursor: pointer; position: relative; z-index: 5;
            transition: transform 0.1s;
        }

        #arc-reactor * { pointer-events: none; }

        .ring { 
            position: absolute; width: 115%; height: 115%; 
            border: 1px solid var(--glow); border-radius: 50%; 
            border-top-color: transparent; animation: spin 3s linear infinite; opacity: 0.3; 
        }

        #display-panel { 
            width: 85%; text-align: center; border-top: 1px solid var(--glow); 
            padding: 20px; min-height: 150px; background: rgba(0,242,255,0.02); 
        }

        #status { font-size: 0.7rem; letter-spacing: 3px; font-weight: bold; margin-bottom: 8px; color: var(--glow); }
        #output { font-size: 0.95rem; font-style: italic; color: #fff; word-wrap: break-word; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="splash">
        <div style="margin-bottom: 30px; font-size: 0.8rem; letter-spacing: 5px; color: var(--glow);">SYSTEMS OFFLINE</div>
        <button id="begin-btn">INITIALIZE</button>
    </div>

    <div id="arc-reactor">
        <div class="ring"></div>
        A
    </div>

    <div id="display-panel">
        <div id="status">OFFLINE</div>
        <div id="output">"Awaiting initialization, Sir."</div>
    </div>

    <script>
        // --- KEYS ---
        const GK_A = "gsk_";
        const GK_B = "zWqULWs5POPr7KPFqUp5WGdyb3FYF5mORx3bOk6Lz9l3LFOfsdta";
        const OK_A = "sk-proj-";
        const OK_B = "1iJ4z-Ut_aTNd3oP3FUjb_23Tc6ngugMShPm9ppNrM7b1Ng7IuwPAltinvmPry0exPvhY-eEr1T3BlbkFJ7-06AAOmNaQE14RhUBD4-5PVNI-7gM3U75dBjzy31tovHzWzCm-kny2LbuIhmK24M9SZh90BsA";
        const F_GK = GK_A + GK_B; const F_OK = OK_A + OK_B;

        const status = document.getElementById('status'), output = document.getElementById('output');
        const reactor = document.getElementById('arc-reactor');
        const splash = document.getElementById('splash');
        let mediaRecorder, chunks = [];

        // INITIALIZE SYSTEM
        document.getElementById('begin-btn').addEventListener('click', async () => {
            try {
                // Request Mic permission
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(t => t.stop()); 

                // Hide splash
                splash.style.pointerEvents = 'none';
                splash.style.opacity = '0';
                
                // Wake up audio
                window.speechSynthesis.getVoices();
                
                setTimeout(() => splash.remove(), 500);
                
                status.innerText = "NEURAL LINK ACTIVE";
                output.innerText = "System ready. Hold the core to speak.";
                speak("Systems online, Sir.");
            } catch (e) {
                alert("Sir, I require microphone access to function. Please check your browser settings.");
            }
        });

        async function processVoice(blob) {
            status.innerText = "LINKING...";
            const fd = new FormData();
            fd.append("file", blob, "audio.m4a");
            fd.append("model", "whisper-1");

            try {
                const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
                    method: "POST", headers: { "Authorization": `Bearer ${F_OK}` }, body: fd
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);

                output.innerText = `"${data.text}"`;
                status.innerText = "THINKING...";

                const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${F_GK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role:"system", content:"You are ARTHUR. A digital squire. Dry British wit. Max 10 words. Sir."}, {role:"user", content: data.text}]
                    })
                });

                const groqData = await groqRes.json();
                const reply = groqData?.choices?.?.message?.content;

                if (reply) {
                    output.innerText = reply;
                    speak(reply);
                    status.innerText = "READY";
                } else {
                    throw new Error(groqData?.error?.message || "Brain mismatch.");
                }
            } catch(e) { 
                status.innerText = "SYSTEM ERROR"; 
                output.innerText = e.message; 
            }
        }

        async function startListening() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(s);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => processVoice(new Blob(chunks, { type: 'audio/mp4' }));
                mediaRecorder.start();
                status.innerText = "LISTENING";
            } catch(e) { status.innerText = "MIC_ERROR"; }
        }

        function speak(t) { 
            window.speechSynthesis.cancel(); 
            const u = new SpeechSynthesisUtterance(t); 
            const voices = window.speechSynthesis.getVoices();
            u.voice = voices.find(v => v.lang.includes('en-GB')) || voices;
            window.speechSynthesis.speak(u); 
        }

        function onStart(e) { if(e.cancelable) e.preventDefault(); reactor.style.transform="scale(0.92)"; startListening(); }
        function onEnd(e) { if(e.cancelable) e.preventDefault(); reactor.style.transform="scale(1)"; if(mediaRecorder?.state === "recording") mediaRecorder.stop(); }

        reactor.addEventListener('touchstart', onStart, {passive: false});
        reactor.addEventListener('touchend', onEnd, {passive: false});
        reactor.addEventListener('mousedown', onStart);
        reactor.addEventListener('mouseup', onEnd);
    </script>
</body>
</html>
