<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUD Controller</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        h1 { color: #00ff88; font-size: 24px; }
        button { background: #333; color: white; border: 2px solid #555; padding: 15px 25px; margin: 10px; font-size: 18px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        button:active { background: #00ff88; color: black; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; max-width: 400px; margin: 20px auto; }
        input { background: #222; border: 1px solid #444; color: white; padding: 12px; width: 80%; max-width: 300px; font-size: 16px; border-radius: 8px; margin-bottom: 10px; }
        #status { margin-top: 20px; font-weight: bold; color: #aaa; }
    </style>
</head>
<body>

    <h1>HUD Smart Glasses</h1>
    <button id="connectBtn" onclick="connectHUD()">🔗 Connect Glasses</button>
    
    <div id="status">Status: Disconnected</div>

    <div class="grid">
        <button onclick="sendQuickNav('L')">⬅️ Left</button>
        <button onclick="sendQuickNav('S')">⬆️ Straight</button>
        <button onclick="sendQuickNav('R')">➡️ Right</button>
    </div>

    <hr style="border: 1px solid #333; margin: 20px 0;">

    <h3>Custom Manual Input</h3>
    <input type="text" id="distInput" placeholder="Distance (e.g., 150m)"><br>
    <input type="text" id="streetInput" placeholder="Street Name (e.g., Oak St.)"><br>
    <button onclick="sendCustomData()">⚡ Sync Layout</button>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        
        let hudCharacteristic = null;

        async function connectHUD() {
            document.getElementById('status').innerText = "Status: Scanning...";
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'HUD_Glasses' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                hudCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                
                document.getElementById('status').innerText = "Status: Connected! 🎉";
                document.getElementById('connectBtn').style.background = "#00ff88";
                document.getElementById('connectBtn').style.color = "black";
            } catch (error) {
                document.getElementById('status').innerText = "Error: " + error.message;
            }
        }

        async function sendData(stringPayload) {
            if (!hudCharacteristic) {
                alert("Please connect to HUD Glasses first!");
                return;
            }
            try {
                const encoder = new TextEncoder();
                await hudCharacteristic.writeValue(encoder.encode(stringPayload));
                console.log("Sent: " + stringPayload);
            } catch (error) {
                document.getElementById('status').innerText = "Send Failed: " + error.message;
            }
        }

        function getFormattedTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        function sendQuickNav(direction) {
            const time = getFormattedTime();
            // Default quick placeholders for button clicks
            const payload = `${time},${direction},200m,Navigating...`;
            sendData(payload);
        }

        function sendCustomData() {
            const time = getFormattedTime();
            const dist = document.getElementById('distInput').value || "0m";
            const street = document.getElementById('streetInput').value || "Route";
            // Default to Straight unless otherwise parsed
            const payload = `${time},S,${dist},${street}`;
            sendData(payload);
        }
    </script>
</body>
</html>
