<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARTHUR FINAL FIX</title>
    <style>
        :root { --gold: #ffd700; --bg: #000; }
        body { background: var(--bg); color: var(--gold); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; justify-content: space-around; overflow: hidden; }
        #core { width: 140px; height: 140px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; text-shadow: 0 0 15px var(--gold); }
        #display { width: 85%; text-align: center; border-top: 1px solid var(--gold); padding: 20px; min-height: 150px; background: rgba(255, 215, 0, 0.05); }
        #ptt-btn { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--gold); background: transparent; color: var(--gold); font-weight: bold; }
        #ptt-btn:active { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <div id="core">A</div>

    <div id="display">
        <div id="status">OFFLINE</div>
        <div id="text">"Tap screen once to authorize Mic, Sir."</div>
    </div>

    <button id="ptt-btn">HOLD</button>

    <script>
        const status = document.getElementById('status');
        const output = document.getElementById('text');
        const btn = document.getElementById('ptt-btn');

        const brain = {
            "status": "Armor integrity is optimal. All systems are green, Sir.",
            "hello": "Greetings, Sir. I am ARTHUR. At your service.",
            "power": "Power cells are at maximum capacity. Ready for battle.",
            "who": "I am ARTHUR, your digital squire and tactical assistant.",
            "identify": "You are the Knight of the Cyber-Realm, Sir."
        };

        // --- FIXED RECOGNITION SETUP ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            output.innerText = "Speech Recognition not supported in this browser.";
        }
        
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            try {
                recognition.start();
                status.innerText = "LISTENING...";
            } catch(err) { console.log(err); }
        });

        btn.addEventListener('touchend', (e) => {
            e.preventDefault();
            recognition.stop();
            status.innerText = "PROCESSING...";
        });

        recognition.onresult = (event) => {
            // FIXED LINE: Added to target the actual text
            const transcript = event.results.transcript.toLowerCase();
            output.innerText = `"${transcript}"`;
            
            let response = "I don't have a protocol for that, Sir.";
            for (let key in brain) {
                if (transcript.includes(key)) {
                    response = brain[key];
                    break;
                }
            }

            setTimeout(() => {
                output.innerText = response;
                speak(response);
                status.innerText = "STANDBY";
            }, 300);
        };

        recognition.onerror = (e) => {
            console.error(e.error);
            status.innerText = "MIC ERROR";
            output.innerText = "Error: " + e.error + ". Check Safari settings.";
        };

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utter.voice = voices.find(v => v.lang.includes('en-GB')) || voices;
            window.speechSynthesis.speak(utter);
        }

        // --- THE "FORCE AUTHORIZE" TAP ---
        document.body.addEventListener('click', () => {
            // Wakes up voice
            window.speechSynthesis.getVoices();
            // Wakes up Mic permission prompt
            try {
                recognition.start();
                setTimeout(() => recognition.stop(), 100);
            } catch(e) {}
            
            status.innerText = "READY";
            output.innerText = "Ready, Sir. Hold the button and say 'Status'.";
        }, {once: true});
    </script>
</body>
</html>
