<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ALFRED v14.0 - GAUNTLET OS</title>
    <style>
        :root { --glow: #00f2ff; --bg: #000b14; --hologram: rgba(0, 242, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
        
        body { 
            background: var(--bg); color: var(--glow); font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-around; 
            height: 100vh; margin: 0; overflow: hidden; padding: 40px 0;
            transition: transform 0.5s ease-in-out;
        }

        /* Rotation Classes */
        body.rot-90 { transform: rotate(90deg); width: 100vh; height: 100vw; }
        body.rot-180 { transform: rotate(180deg); }
        body.rot-270 { transform: rotate(270deg); width: 100vh; height: 100vw; }

        #init-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        #init-btn { border: 1px solid var(--glow); padding: 20px 40px; color: var(--glow); background: transparent; text-transform: uppercase; letter-spacing: 4px; cursor: pointer; box-shadow: 0 0 15px var(--glow); font-size: 1.2rem; }
        
        #arc-reactor { 
            width: 180px; height: 180px; border: 1px solid var(--glow); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 3rem; 
            text-shadow: 0 0 15px var(--glow); box-shadow: inset 0 0 30px var(--hologram), 0 0 20px var(--hologram); 
            cursor: pointer; position: relative; z-index: 5; transition: all 0.3s; 
        }
        #arc-reactor.active { box-shadow: inset 0 0 50px var(--glow), 0 0 30px var(--glow); transform: scale(1.05); }
        
        .ring { position: absolute; width: 120%; height: 120%; border: 1px solid var(--hologram); border-radius: 50%; border-top: 2px solid var(--glow); animation: spin 4s linear infinite; }
        .scanner { position: absolute; width: 100%; height: 2px; background: var(--glow); top: 50%; opacity: 0; box-shadow: 0 0 10px var(--glow); pointer-events: none; }
        .listening .scanner { animation: scan 1.5s ease-in-out infinite; opacity: 0.5; }

        #display-panel { width: 90%; text-align: center; padding: 20px; border-top: 1px solid var(--hologram); }
        #status { font-size: 0.6rem; letter-spacing: 5px; opacity: 0.7; margin-bottom: 10px; text-transform: uppercase; }
        #output { font-size: 1.1rem; font-weight: 300; line-height: 1.4; color: #e0faff; min-height: 60px; font-style: italic; }

        #flip-btn {
            position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.5);
            border: 1px solid var(--hologram); color: var(--glow); padding: 10px;
            font-size: 0.6rem; z-index: 10; cursor: pointer; border-radius: 5px;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes scan { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }
    </style>
</head>
<body>

    <div id="init-screen">
        <button id="init-btn">Initialize Suit OS</button>
    </div>

    <button id="flip-btn">ROTATION: 0°</button>

    <div id="arc-reactor">
        <div class="ring"></div>
        <div class="scanner"></div>
        A
    </div>

    <div id="display-panel">
        <div id="status">OFFLINE</div>
        <div id="output">"Awaiting instructions, Sir."</div>
    </div>

    <script>
        // API Keys (Ensure these are active)
        const GK_A = "gsk_", GK_B = "zWqULWs5POPr7KPFqUp5WGdyb3FYF5mORx3bOk6Lz9l3LFOfsdta";
        const OK_A = "sk-proj-", OK_B = "1iJ4z-Ut_aTNd3oP3FUjb_23Tc6ngugMShPm9ppNrM7b1Ng7IuwPAltinvmPry0exPvhY-eEr1T3BlbkFJ7-06AAOmNaQE14RhUBD4-5PVNI-7gM3U75dBjzy31tovHzWzCm-kny2LbuIhmK24M9SZh90BsA";
        const F_GK = GK_A + GK_B, F_OK = OK_A + OK_B;
        
        const status = document.getElementById('status'), output = document.getElementById('output'), reactor = document.getElementById('arc-reactor');
        let mediaRecorder, chunks = [];

        // --- INTERFACE ROTATION ---
        let rotation = 0;
        document.getElementById('flip-btn').addEventListener('click', () => {
            rotation = (rotation + 90) % 360;
            document.body.className = rotation !== 0 ? `rot-${rotation}` : '';
            document.getElementById('flip-btn').innerText = `ROTATION: ${rotation}°`;
            if (navigator.vibrate) navigator.vibrate(40);
        });

        // --- AUDIO INITIALIZATION ---
        document.getElementById('init-btn').addEventListener('click', async () => {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            ctx.resume();
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(t => t.stop());
                speak("Systems initialized. ALFRED is online, Sir.");
                document.getElementById('init-screen').style.opacity = '0';
                setTimeout(() => { document.getElementById('init-screen').style.display = 'none'; status.innerText = "LINK ACTIVE"; }, 800);
            } catch (e) { alert("Microphone access required for Suit OS."); }
        });

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            msg.voice = voices.find(v => v.lang === 'en-GB') || voices[0];
            msg.rate = 0.95;
            msg.onstart = () => reactor.classList.add('active');
            msg.onend = () => reactor.classList.remove('active');
            window.speechSynthesis.speak(msg);
        }

        async function processVoice(blob) {
            status.innerText = "ANALYZING...";
            if (navigator.vibrate) navigator.vibrate(); // "Thinking" haptic

            const fd = new FormData();
            fd.append("file", blob, "audio.m4a");
            fd.append("model", "whisper-1");

            try {
                const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
                    method: "POST", headers: { "Authorization": `Bearer ${F_OK}` }, body: fd
                });
                const data = await res.json();
                const cmd = data.text.toLowerCase().trim();
                output.innerText = `"${data.text}"`;

                // --- HARDWARE / SHORTCUT LOGIC ---
                // Command must start with "open" or "run" or contain "shortcut"
                if (cmd.startsWith("open") || cmd.includes("shortcut") || cmd.includes("run")) {
                    let scName = cmd.replace("open", "").replace("run", "").replace("shortcut", "").trim();
                    speak(`Executing ${scName} protocol, Sir.`);
                    window.location.href = `shortcuts://run-shortcut?name=${encodeURIComponent(scName)}`;
                    return;
                }

                if (cmd.includes("time")) {
                    speak(`The current time is ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}.`);
                    return;
                }

                // --- AI RESPONSE (GROQ) ---
                const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${F_GK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "system", content: "You are ALFRED, a suit AI. Be concise, loyal, and address user as Sir."}, {role: "user", content: data.text}]
                    })
                });
                const groqData = await groqRes.json();
                const reply = groqData.choices[0].message.content;
                output.innerText = reply;
                speak(reply);
                status.innerText = "READY";
            } catch(e) { status.innerText = "ERROR"; }
        }

        async function startListening() {
            try {
                if (navigator.vibrate) navigator.vibrate(50); // Start haptic
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(s);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => processVoice(new Blob(chunks, { type: 'audio/mp4' }));
                mediaRecorder.start();
                status.innerText = "LISTENING...";
                reactor.classList.add('listening');
            } catch(e) { status.innerText = "MIC_ERROR"; }
        }

        // Touch triggers for GAUNTLET mode
        reactor.addEventListener('touchstart', (e) => { e.preventDefault(); startListening(); });
        reactor.addEventListener('touchend', (e) => { e.preventDefault(); if(mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop(); });
        
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    </script>
</body>
</html>
