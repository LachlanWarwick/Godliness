<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARTHUR HUD v4</title>
    <style>
        :root { --gold: #ffd700; --bg: #000; }
        body { background: var(--bg); color: var(--gold); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; justify-content: space-around; overflow: hidden; }
        #core { width: 130px; height: 130px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; text-shadow: 0 0 10px var(--gold); position: relative; }
        .ring { position: absolute; width: 100%; height: 100%; border: 2px solid var(--gold); border-radius: 50%; border-bottom-color: transparent; }
        #display { width: 85%; text-align: center; border-top: 1px solid var(--gold); padding: 20px; min-height: 130px; }
        #status { font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 8px; opacity: 0.8; }
        #ptt-btn { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--gold); background: transparent; color: var(--gold); font-weight: bold; font-size: 1rem; }
        #ptt-btn:active { background: var(--gold); color: black; transform: scale(0.95); }
        .spin { animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="core">
        <div id="ring" class="ring"></div>
        A
    </div>

    <div id="display">
        <div id="status">ARTHUR CORE v4.0</div>
        <div id="text">"Initializing audio link... Tap once to begin, Sir."</div>
    </div>

    <button id="ptt-btn">HOLD</button>

    <script type="module">
        // --- 1. THE REFINED TOKEN ---
        const HF_TOKEN = "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"; 
        const MODEL_URL = "https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta";

        const status = document.getElementById('status');
        const output = document.getElementById('text');
        const btn = document.getElementById('ptt-btn');
        const ring = document.getElementById('ring');

        // --- 2. THE IMPROVED NEURAL LINK ---
        async function queryAI(input) {
            const response = await fetch(MODEL_URL, {
                headers: { 
                    "Authorization": `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/json"
                },
                method: "POST",
                body: JSON.stringify({
                    inputs: `<|system|>\nYou are ARTHUR, a British AI. Be formal. Call user 'Sir'. Under 10 words.</s>\n<|user|>\n${input}</s>\n<|assistant|>\n`,
                    options: { wait_for_model: true } 
                }),
            });

            if (response.status === 401) throw new Error("401: Invalid Token. Check for spaces.");
            if (response.status === 503) throw new Error("503: Warm-up in progress. Try again in 20s.");

            const result = await response.json();
            let reply = Array.isArray(result) ? result.generated_text : result.generated_text;
            return reply.split('<|assistant|>').pop().trim();
        }

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            try { 
                recognition.start(); 
                status.innerText = "LISTENING...";
                ring.classList.add('spin');
            } catch(e) {}
        });

        btn.addEventListener('touchend', () => {
            recognition.stop();
            status.innerText = "LINKING...";
        });

        recognition.onresult = async (event) => {
            const transcript = event.results.transcript;
            output.innerText = `"${transcript}"`;

            try {
                const aiReply = await queryAI(transcript);
                output.innerText = aiReply;
                speak(aiReply);
                status.innerText = "ARTHUR STANDBY";
            } catch (err) {
                status.innerText = "LINK ERROR";
                output.innerText = "Sir: " + err.message;
            }
            ring.classList.remove('spin');
        };

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utter.voice = voices.find(v => v.lang.includes('en-GB')) || voices;
            utter.pitch = 0.9;
            window.speechSynthesis.speak(utter);
        }

        // iPhone Audio Unlocking
        document.body.addEventListener('click', () => {
            window.speechSynthesis.getVoices();
            output.innerText = "Audio online, Sir. Hold the button to speak.";
        }, {once: true});
    </script>
</body>
</html>
