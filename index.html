<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARTHUR v13.1</title>
    <style>
        :root { --glow: #00f2ff; --bg: #000b14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; touch-action: none; }
        body { background: var(--bg); color: var(--glow); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: space-around; height: 100vh; margin: 0; overflow: hidden; padding: 40px 0; }
        #arc-reactor { width: 160px; height: 160px; border: 2px solid var(--glow); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; text-shadow: 0 0 10px var(--glow); box-shadow: inset 0 0 20px var(--glow), 0 0 15px var(--glow); cursor: pointer; position: relative; z-index: 5; }
        .ring { position: absolute; width: 115%; height: 115%; border: 1px solid var(--glow); border-radius: 50%; border-top-color: transparent; animation: spin 3s linear infinite; opacity: 0.3; }
        #display-panel { width: 85%; text-align: center; border-top: 1px solid var(--glow); padding: 20px; min-height: 150px; background: rgba(0,242,255,0.02); }
        #status { font-size: 0.7rem; letter-spacing: 3px; font-weight: bold; margin-bottom: 8px; color: var(--glow); }
        #output { font-size: 0.95rem; font-style: italic; color: #fff; word-wrap: break-word; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="arc-reactor"><div class="ring"></div>A</div>

    <div id="display-panel">
        <div id="status">NEURAL LINK ACTIVE</div>
        <div id="output">"Ready for duty, Sir. Hold the core to speak."</div>
    </div>

    <script>
        const GK_A = "gsk_", GK_B = "zWqULWs5POPr7KPFqUp5WGdyb3FYF5mORx3bOk6Lz9l3LFOfsdta";
        const OK_A = "sk-proj-", OK_B = "1iJ4z-Ut_aTNd3oP3FUjb_23Tc6ngugMShPm9ppNrM7b1Ng7IuwPAltinvmPry0exPvhY-eEr1T3BlbkFJ7-06AAOmNaQE14RhUBD4-5PVNI-7gM3U75dBjzy31tovHzWzCm-kny2LbuIhmK24M9SZh90BsA";

        const F_GK = GK_A + GK_B;
        const F_OK = OK_A + OK_B;

        const status = document.getElementById('status'), output = document.getElementById('output');
        let mediaRecorder, chunks = [];

        async function processVoice(blob) {
            status.innerText = "LINKING...";
            const fd = new FormData();
            fd.append("file", blob, "audio.m4a");
            fd.append("model", "whisper-1");

            try {
                const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
                    method: "POST", headers: { "Authorization": `Bearer ${F_OK}` }, body: fd
                });
                const data = await res.json();
                if (data.error) throw new Error("OpenAI: " + data.error.message);

                output.innerText = `"${data.text}"`;
                status.innerText = "THINKING...";

                const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${F_GK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{role:"system", content:"You are ARTHUR. Dry wit. Max 10 words. Sir."}, {role:"user", content: data.text}]
                    })
                });

                const groqData = await groqRes.json();
                if (groqData.error) throw new Error("Groq: " + groqData.error.message);

                // FIXED: Accessing the array element
                const reply = groqData?.choices?.?.message?.content;

                if (reply) {
                    output.innerText = reply;
                    speak(reply);
                    status.innerText = "READY";
                } else {
                    throw new Error("Brain structure mismatch.");
                }
            } catch(e) { 
                status.innerText = "SYSTEM ERROR"; 
                output.innerText = e.message; 
            }
        }

        async function startListening() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(s);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => processVoice(new Blob(chunks, { type: 'audio/mp4' }));
                mediaRecorder.start();
                status.innerText = "LISTENING";
            } catch(e) { status.innerText = "MIC_ERROR"; }
        }

        function speak(t) { 
            window.speechSynthesis.cancel(); 
            const u = new SpeechSynthesisUtterance(t); 
            u.lang = 'en-GB';
            window.speechSynthesis.speak(u); 
        }

        const r = document.getElementById('arc-reactor');
        r.addEventListener('touchstart', (e) => { e.preventDefault(); startListening(); }, {passive: false});
        r.addEventListener('touchend', (e) => { e.preventDefault(); if(mediaRecorder) mediaRecorder.stop(); }, {passive: false});
        document.addEventListener('touchstart', () => { window.speechSynthesis.getVoices(); }, {once: true});
    </script>
</body>
</html>
