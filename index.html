<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Godliness MVP</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #fbbf24; --accent: #3b82f6; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .box, .task-item { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: var(--primary); border: none; padding: 12px 20px; border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer; color: #000; }
        .hidden { display: none; }
        #auth-screen, #squad-screen { text-align: center; margin-top: 50px; }
        .lb-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>
    <div class="container">
        
        <div id="auth-screen">
            <h1>Godliness</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="handleAuth('login')">Login</button>
            <p onclick="handleAuth('signup')" style="font-size: 0.8rem; margin-top: 15px; opacity: 0.7;">No account? <span style="color:var(--primary)">Sign Up</span></p>
        </div>

        <div id="squad-screen" class="hidden">
            <h2>Welcome, <span id="user-name-display"></span></h2>
            <p>Join or Create a Squad to begin</p>
            <input type="text" id="squad-input" placeholder="Enter 6-Digit Code">
            <button onclick="joinSquad()">Join Squad</button>
            <div style="margin: 20px 0; opacity: 0.5;">— OR —</div>
            <button style="background: var(--accent); color: white;" onclick="createSquad()">Create New Squad</button>
            <button style="margin-top: 20px; background: transparent; color: gray;" onclick="firebase.auth().signOut()">Logout</button>
        </div>

        <div id="app-screen" class="hidden">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 id="squad-name-display">Squad</h3>
                <small id="squad-code-display" style="color:var(--primary)"></small>
            </div>

            <div class="box" style="text-align: center;">
                <h2 id="lvl-display">Level 1</h2>
                <p>XP: <span id="xp-val">0</span></p>
            </div>

            <div class="box">
                <h3>Leaderboard</h3>
                <div id="leaderboard"></div>
            </div>

            <button onclick="logTask()">Log Activity (+15 XP)</button>
            <button style="margin-top: 10px; background: #ef4444; color: white;" onclick="firebase.auth().signOut()">Logout</button>
        </div>
    </div>

    <script>
        // PASTE YOUR CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyAwJEP9IzCqyaNKQBjJohPEmykTpSBL5l4",
            authDomain: "godliness-bd3f8.firebaseapp.com",
            projectId: "godliness-bd3f8",
            storageBucket: "godliness-bd3f8.firebasestorage.app",
            messagingSenderId: "520495643556",
            appId: "1:520495643556:web:e107bee032556f9ed89f31"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let currentSquad = null;

        // AUTH LOGIC
        function handleAuth(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if (type === 'signup') {
                auth.createUserWithEmailAndPassword(e, p).then(res => {
                    const name = prompt("Choose a Display Name:");
                    db.collection('users').doc(res.user.uid).set({ name, xp: 0, lvl: 1, squadId: null });
                });
            } else {
                auth.signInWithEmailAndPassword(e, p);
            }
        }

        // LISTEN FOR USER STATE
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                loadUserData();
            } else {
                location.reload(); // Simple reset on logout
            }
        });

        async function loadUserData() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            const data = doc.data();
            document.getElementById('user-name-display').innerText = data.name;
            
            if (data.squadId) {
                currentSquad = data.squadId;
                showApp();
            } else {
                document.getElementById('squad-screen').classList.remove('hidden');
            }
        }

        // SQUAD LOGIC
        async function createSquad() {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            await db.collection('squads').doc(code).set({ createdBy: currentUser.uid });
            await db.collection('users').doc(currentUser.uid).update({ squadId: code });
            location.reload();
        }

        async function joinSquad() {
            const code = document.getElementById('squad-input').value.toUpperCase();
            const squad = await db.collection('squads').doc(code).get();
            if (squad.exists()) {
                await db.collection('users').doc(currentUser.uid).update({ squadId: code });
                location.reload();
            } else {
                alert("Squad not found!");
            }
        }

        function showApp() {
            document.getElementById('squad-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('squad-code-display').innerText = `Code: ${currentSquad}`;
            
            // Sync Leaderboard
            db.collection('users').where('squadId', '==', currentSquad)
                .onSnapshot(snap => {
                    const lb = document.getElementById('leaderboard');
                    lb.innerHTML = '';
                    let members = [];
                    snap.forEach(doc => members.push(doc.data()));
                    members.sort((a,b) => b.lvl - a.lvl || b.xp - a.xp).forEach((m, i) => {
                        lb.innerHTML += `<div class="lb-row"><span>#${i+1} ${m.name}</span><b>LVL ${m.lvl}</b></div>`;
                        if(m.name === document.getElementById('user-name-display').innerText) {
                            document.getElementById('lvl-display').innerText = `Level ${m.lvl}`;
                            document.getElementById('xp-val').innerText = m.xp;
                        }
                    });
                });
        }

        async function logTask() {
            const docRef = db.collection('users').doc(currentUser.uid);
            const doc = await docRef.get();
            let { xp, lvl } = doc.data();
            xp += 15;
            if (xp >= 700) { xp = 0; lvl++; }
            await docRef.update({ xp, lvl });
        }
    </script>
</body>
</html>
