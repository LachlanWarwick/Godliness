<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ARTHUR HUD v6.0</title>
    <style>
        :root { --gold: #ffd700; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--gold); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; justify-content: space-between; padding: 60px 0; overflow: hidden; }
        
        #core { width: 140px; height: 140px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; text-shadow: 0 0 15px var(--gold); position: relative; }
        .ring { position: absolute; width: 100%; height: 100%; border: 2px solid var(--gold); border-radius: 50%; border-bottom-color: transparent; }
        
        #display { width: 85%; text-align: center; border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold); padding: 20px; min-height: 150px; display: flex; flex-direction: column; justify-content: center; background: rgba(255, 215, 0, 0.05); }
        #status { font-size: 0.7rem; letter-spacing: 4px; margin-bottom: 8px; font-weight: bold; }
        
        #ptt-btn { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--gold); background: transparent; color: var(--gold); font-weight: bold; font-size: 1.1rem; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); transition: all 0.2s; }
        #ptt-btn:active { background: var(--gold); color: black; transform: scale(0.9); }
        
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="core">
        <div id="ring" class="ring"></div>
        A
    </div>

    <div id="display">
        <div id="status">GITHUB_LINK_SECURE</div>
        <div id="text">"Waiting for authentication tap, Sir."</div>
    </div>

    <button id="ptt-btn">HOLD</button>

    <script>
        const status = document.getElementById('status');
        const output = document.getElementById('text');
        const btn = document.getElementById('ptt-btn');
        const ring = document.getElementById('ring');

        const brain = {
            "status": "Armor integrity is optimal. All systems are green, Sir.",
            "hello": "Greetings, Sir. I am ARTHUR. Ready for deployment.",
            "power": "Core power cells are at one hundred percent.",
            "who": "I am ARTHUR, your digital squire. Welcome to the GitHub grid.",
            "identify": "You are the Cyber-Knight, protector of the realm."
        };

        const recognition = new (window.webkitSpeechRecognition || window.SpeechRecognition)();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            window.speechSynthesis.cancel();
            try {
                recognition.start();
                status.innerText = "LISTENING...";
                ring.classList.add('spin');
            } catch(err) {}
        });

        btn.addEventListener('touchend', (e) => {
            e.preventDefault();
            recognition.stop();
            status.innerText = "PROCESSING...";
        });

        recognition.onresult = (event) => {
            const transcript = event.results.transcript.toLowerCase();
            output.innerText = `"${transcript}"`;
            
            let response = "I don't have a protocol for that, Sir.";
            for (let key in brain) {
                if (transcript.includes(key)) {
                    response = brain[key];
                    break;
                }
            }

            setTimeout(() => {
                output.innerText = response;
                speak(response);
                status.innerText = "STANDBY";
                ring.classList.remove('spin');
            }, 300);
        };

        recognition.onerror = (e) => {
            status.innerText = "LINK ERROR";
            output.innerText = "Error: " + e.error;
            ring.classList.remove('spin');
        };

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            utter.voice = voices.find(v => v.lang.includes('en-GB')) || voices;
            utter.pitch = 0.95;
            window.speechSynthesis.speak(utter);
        }

        // --- GITHUB SECURE AUTHORIZATION ---
        document.body.addEventListener('click', () => {
            window.speechSynthesis.getVoices();
            // This test-start often triggers the "Allow Microphone" prompt on GitHub
            try {
                recognition.start();
                setTimeout(() => recognition.stop(), 100);
            } catch(e) {}
            
            status.innerText = "LINK_ACTIVE";
            output.innerText = "Welcome back, Sir. Hold the button to command.";
        }, {once: true});
    </script>
</body>
</html>
