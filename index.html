<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Godliness MVP</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --primary: #fbbf24; --accent: #3b82f6; --danger: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; }
        .box { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); border: none; padding: 14px; border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer; color: #000; transition: transform 0.1s; margin-top: 10px; }
        button:active { transform: scale(0.98); }
        .hidden { display: none !important; }
        .lb-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #334155; }
        .lb-row:last-child { border: none; }
        #auth-screen { text-align: center; margin-top: 60px; }
        .loading-spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        
        <div id="auth-screen">
            <h1 style="color: var(--primary); font-size: 2.5rem; margin-bottom: 0;">GODLINESS</h1>
            <p style="opacity: 0.6; margin-bottom: 30px;">Ascend with your Squad</p>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="handleAuth('login')">Login</button>
            <button style="background: transparent; color: var(--primary); border: 1px solid var(--primary);" onclick="handleAuth('signup')">Create Account</button>
            <div id="auth-loading" class="hidden"><div class="loading-spinner"></div></div>
        </div>

        <div id="squad-screen" class="hidden">
            <h2 style="text-align: center;">Welcome, <span id="user-name-display" style="color: var(--primary);"></span></h2>
            <div class="box">
                <p style="margin-top: 0;">Join a Squad</p>
                <input type="text" id="squad-input" placeholder="Enter 6-Digit Code">
                <button onclick="joinSquad()">Join Squad</button>
            </div>
            <div style="text-align: center; margin: 20px 0; opacity: 0.5;">— OR —</div>
            <button style="background: var(--accent); color: white;" onclick="createSquad()">Create New Squad</button>
            <button style="margin-top: 40px; background: transparent; color: gray;" onclick="logout()">Logout</button>
        </div>

        <div id="app-screen" class="hidden">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                <h3 id="squad-name-display" style="margin:0;">Active Squad</h3>
                <div style="text-align: right;">
                    <small style="opacity: 0.6;">Invite Code</small><br>
                    <b id="squad-code-display" style="color:var(--primary); letter-spacing: 1px;"></b>
                </div>
            </div>

            <div class="box" style="text-align: center; background: linear-gradient(145deg, #1e293b, #0f172a);">
                <h1 id="lvl-display" style="font-size: 3rem; margin: 0; color: var(--primary);">1</h1>
                <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; opacity: 0.7;">Current Level</p>
                <div style="background: #334155; height: 8px; border-radius: 10px; margin: 15px 0; overflow: hidden;">
                    <div id="xp-bar" style="background: var(--primary); height: 100%; width: 0%; transition: width 0.5s;"></div>
                </div>
                <small>XP: <span id="xp-val">0</span> / 700</small>
            </div>

            <div class="box">
                <h3 style="margin-top:0;">Leaderboard</h3>
                <div id="leaderboard"></div>
            </div>

            <button onclick="logTask()" id="log-btn">Log Daily Victory (+50 XP)</button>
            <button style="margin-top: 15px; background: transparent; color: var(--danger); font-size: 0.8rem;" onclick="logout()">Logout Account</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAwJEP9IzCqyaNKQBjJohPEmykTpSBL5l4",
            authDomain: "godliness-bd3f8.firebaseapp.com",
            projectId: "godliness-bd3f8",
            storageBucket: "godliness-bd3f8.firebasestorage.app",
            messagingSenderId: "520495643556",
            appId: "1:520495643556:web:e107bee032556f9ed89f31"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let squadListener = null;

        // AUTH HANDLER
        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("Enter details");
            
            document.getElementById('auth-loading').classList.remove('hidden');
            
            try {
                if (type === 'signup') {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    const name = prompt("Enter your display name:");
                    await db.collection('users').doc(res.user.uid).set({
                        name: name || "User",
                        xp: 0,
                        lvl: 1,
                        squadId: null,
                        lastLog: null
                    });
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
            } catch (e) {
                alert(e.message);
                document.getElementById('auth-loading').classList.add('hidden');
            }
        }

        function logout() {
            if(squadListener) squadListener();
            auth.signOut();
        }

        // STATE MANAGER
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                loadView();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
                document.getElementById('squad-screen').classList.add('hidden');
                document.getElementById('auth-loading').classList.add('hidden');
            }
        });

        async function loadView() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            const data = doc.data();
            
            if (data.squadId) {
                showApp(data.squadId);
            } else {
                document.getElementById('user-name-display').innerText = data.name;
                document.getElementById('squad-screen').classList.remove('hidden');
            }
        }

        // SQUAD ACTIONS
        async function createSquad() {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            await db.collection('squads').doc(code).set({ created: Date.now(), owner: currentUser.uid });
            await db.collection('users').doc(currentUser.uid).update({ squadId: code });
            showApp(code);
        }

        async function joinSquad() {
            const code = document.getElementById('squad-input').value.toUpperCase();
            if(!code) return;
            const squad = await db.collection('squads').doc(code).get();
            if (squad.exists()) {
                await db.collection('users').doc(currentUser.uid).update({ squadId: code });
                showApp(code);
            } else {
                alert("Squad code not found.");
            }
        }

        function showApp(squadId) {
            document.getElementById('squad-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('squad-code-display').innerText = squadId;

            // Live Leaderboard & User Stats
            if(squadListener) squadListener(); // Clean old listener
            squadListener = db.collection('users').where('squadId', '==', squadId)
                .onSnapshot(snap => {
                    const lb = document.getElementById('leaderboard');
                    lb.innerHTML = '';
                    let members = [];
                    snap.forEach(doc => members.push({id: doc.id, ...doc.data()}));
                    
                    members.sort((a,b) => b.lvl - a.lvl || b.xp - a.xp).forEach((m, i) => {
                        const isMe = m.id === currentUser.uid;
                        lb.innerHTML += `
                            <div class="lb-row" style="${isMe ? 'color: var(--primary); font-weight: bold;' : ''}">
                                <span>#${i+1} ${m.name} ${isMe ? '(You)' : ''}</span>
                                <span>LVL ${m.lvl}</span>
                            </div>`;
                        
                        if(isMe) {
                            document.getElementById('lvl-display').innerText = m.lvl;
                            document.getElementById('xp-val').innerText = m.xp;
                            document.getElementById('xp-bar').style.width = (m.xp / 700 * 100) + '%';
                        }
                    });
                });
        }

        async function logTask() {
            const btn = document.getElementById('log-btn');
            btn.disabled = true;
            const docRef = db.collection('users').doc(currentUser.uid);
            const doc = await docRef.get();
            let { xp, lvl } = doc.data();
            
            xp += 50;
            if (xp >= 700) { xp = 0; lvl++; confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); }
            
            await docRef.update({ xp, lvl, lastLog: Date.now() });
            btn.disabled = false;
        }
    </script>
</body>
</html>
