<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTHUR PROJECT: BRAIN</title>
    <style>
        :root { --glow: #00f2ff; --bg: #00050a; } /* Switched to Cyan for a JARVIS feel */
        body { background: var(--bg); color: var(--glow); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #arc-reactor { width: 150px; height: 150px; border: 3px solid var(--glow); border-radius: 50%; box-shadow: 0 0 20px var(--glow); display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        #arc-reactor.active { animation: pulse 0.5s infinite alternate; }
        #status-text { margin-top: 30px; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; }
        #ai-output { width: 80%; text-align: center; margin-top: 20px; font-style: italic; min-height: 50px; }
        @keyframes pulse { from { transform: scale(1); box-shadow: 0 0 20px var(--glow); } to { transform: scale(1.05); box-shadow: 0 0 40px var(--glow); } }
    </style>
</head>
<body>

    <div id="arc-reactor" id="trigger">
        <div id="inner-core">A</div>
    </div>

    <div id="status-text">Neural Link: Standby</div>
    <div id="ai-output">"Waiting for command, Sir."</div>

    <script>
        // --- SECURE KEYS ---
        const GROQ_KEY = "YOUR_GROQ_API_KEY";
        const OPENAI_KEY = "YOUR_OPENAI_API_KEY";

        const reactor = document.getElementById('arc-reactor');
        const status = document.getElementById('status-text');
        const output = document.getElementById('ai-output');

        let mediaRecorder;
        let audioChunks = [];

        // 1. MIC CAPTURE (HARDWARE LEVEL)
        async function startListening() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();
            
            status.innerText = "LISTENING...";
            reactor.classList.add('active');

            mediaRecorder.ondataavailable = (event) => audioChunks.push(event.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                processVoice(audioBlob);
                audioChunks = [];
            };
        }

        // 2. WHISPER: THE EARS (TRANSCRIBE)
        async function processVoice(blob) {
            status.innerText = "TRANSCRIBING...";
            const formData = new FormData();
            formData.append("file", blob, "recording.webm");
            formData.append("model", "whisper-1");

            const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
                headers: { "Authorization": `Bearer ${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
}` },
                method: "POST",
                body: formData
            });
            const data = await res.json();
            think(data.text);
        }

        // 3. GROQ: THE BRAIN (LLAMA 3)
        async function think(userText) {
            status.innerText = "THINKING...";
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                headers: { 
                    "Authorization": `Bearer ${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}`,
                    "Content-Type": "application/json" 
                },
                method: "POST",
                body: JSON.stringify({
                    model: "llama3-8b-8192",
                    messages: [
                        { role: "system", content: "You are ARTHUR, a British AI squire. Formal, dry wit. Max 15 words. Address as Sir." },
                        { role: "user", content: userText }
                    ]
                })
            });
            const data = await res.json();
            const reply = data.choices.message.content;
            
            output.innerText = reply;
            speak(reply);
            status.innerText = "NEURAL LINK: STANDBY";
            reactor.classList.remove('active');
        }

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.voice = window.speechSynthesis.getVoices().find(v => v.lang.includes('en-GB')) || window.speechSynthesis.getVoices();
            window.speechSynthesis.speak(utter);
        }

        // TRIGGER LOGIC
        reactor.addEventListener('mousedown', startListening);
        reactor.addEventListener('mouseup', () => mediaRecorder.stop());
        
        // Touch support for Mobile
        reactor.addEventListener('touchstart', (e) => { e.preventDefault(); startListening(); });
        reactor.addEventListener('touchend', () => mediaRecorder.stop());
    </script>
</body>
</html>
